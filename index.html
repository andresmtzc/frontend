<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>palo.mx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Clash+Grotesk:wght@600;700&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── design system: lucha libre ── */
    :root {
      --bg:        #111111;
      --surface:   #1c1c1c;
      --surface-2: #161616;
      --border:    #333333;
      --border-2:  #2a2a2a;
      --magenta:   #e63946;
      --sport:     #8BE9FD;
      --gold:      #ffd60a;
      --green:     #4ade80;
      --muted:     #555555;
      --text:      #ffffff;
    }
    :root { --nav-h: 0px; --match-title-h: 32px; --mkt-title-h: 33px; }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .pixel { font-family: 'Press Start 2P', monospace; }
    .mono  { font-family: 'Geist Mono', monospace; font-variant-numeric: tabular-nums; }

    /* tabs */
    .tab-active   { border-bottom-color: var(--sport) !important; color: var(--text) !important; border-bottom-width: 3px !important; }
    .tab-inactive { border-bottom-color: transparent; color: var(--muted); }
    .tab-inactive:hover { color: var(--text); }

    /* match pills */
    .match-pill-active   { background: var(--sport); color: #111; border-color: var(--sport); }
    .match-pill-inactive { background: transparent; color: var(--muted); border-color: var(--border); border-radius: 0 !important; }
    .match-pill-inactive:hover { border-color: var(--sport); color: var(--text); }

    /* filter buttons */
    .filter-btn-active   { border-color: var(--gold) !important; color: var(--gold) !important; }

    /* odds coloring */
    .odds-pos { color: var(--green); }
    .odds-neg { color: var(--magenta); }

    /* INSERT COIN blink */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .insert-coin { animation: blink 1.1s step-end infinite; }

    /* Retro loader */
    #retro-loader {
      display: none;
      position: fixed; bottom: 49px; left: 50%; transform: translateX(-50%);
      z-index: 999;
      background: var(--surface-2); border: 3px solid var(--border);
      padding: 10px 18px; flex-direction: column; align-items: center; gap: 8px;
    }
    #retro-loader.visible { display: flex; }
    #retro-loader .rl-line1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: #fff; letter-spacing: 1px;
      animation: blink 1s step-end infinite;
    }
    #retro-loader .rl-line2 {
      white-space: nowrap;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; color: var(--muted); letter-spacing: 1px;
    }

    #info-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 998;
    }
    #info-backdrop.visible { display: block; }
    @media (min-width: 640px) {
      table[data-mkt] th:nth-child(1),
      table[data-mkt] td:nth-child(1):not([data-expansion-cell]) { width: 300px !important; }
    }
    #info-modal {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%); z-index: 999;
      background: var(--surface-2); border: 3px solid var(--border);
      padding: 20px 28px; flex-direction: column; align-items: flex-start; gap: 12px;
      min-width: 300px; max-width: 420px;
    }
    #info-modal.visible { display: flex; }
    #info-modal .im-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: #fff; letter-spacing: 1px;
    }
    #info-modal .im-line {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; color: var(--muted); letter-spacing: 1px; line-height: 1.9;
    }
    #info-modal .im-line.hi { color: #fff; }
    #info-modal .im-sep {
      width: 100%; height: 1px; background: var(--border);
    }

    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .mkt-body + .mkt-title { margin-top: 2px; }
    .mkt-body:last-child { margin-bottom: 0; }
  </style>
</head>
<body class="min-h-screen" style="background:var(--bg);color:var(--text)">

<header class="fixed top-0 left-0 right-0 z-50 backdrop-blur" style="background:rgba(17,17,17,0.97);border-bottom:3px solid var(--sport)">
  <div style="height:4px;background:#222222"></div>
  <div class="max-w-[960px] mx-auto px-4 py-2 flex items-center relative">
    <!-- logo — click to reload page -->
    <div class="flex items-center gap-3 shrink-0" onclick="window.location.reload()" style="cursor:pointer">
      <img src="logo12.png" alt="palo.mx piñata" style="width:28px;height:28px;image-rendering:pixelated">
      <div class="flex flex-col">
        <h1 style="font-family:'Press Start 2P',monospace;font-size:13px;line-height:1;letter-spacing:-2px;color:var(--text)">
          PALO<span style="color:var(--gold)">.</span><span style="color:var(--gold);margin-left:-2px">MX</span>
        </h1>
      </div>
      <div id="sport-switcher" class="flex items-center gap-1.5"></div>
    </div>
    <div class="flex items-center gap-2 ml-auto">
      <div id="bet-wrapper" class="flex items-center gap-1" style="display:none!important">
        <span class="mono" style="font-size:13px;font-weight:700;color:var(--muted)">$</span>
        <input type="number" id="bet-amt" value="100" min="1" step="10"
          class="mono text-center w-16 px-2 py-1"
          style="background:var(--surface-2);border:1px solid var(--border-2);color:var(--gold);font-size:13px;font-weight:600;border-radius:2px;outline:none"
          onfocus="this.style.borderColor='var(--sport)'" onblur="this.style.borderColor='var(--border-2)'"
          oninput="updateOddsInPlace()" />
      </div>
      <button id="mode-btn" onclick="cycleMode()"
        class="mono shrink-0"
        style="font-size:11px;font-weight:700;padding:4px 10px;background:var(--surface-2);border:2px solid var(--gold);color:var(--gold);cursor:pointer">
        US
      </button>
    </div>
  </div>
</header>

<div id="match-pills-wrapper" style="position:fixed;left:0;right:0;z-index:45;background:var(--bg)">
  <div class="max-w-[960px] mx-auto px-4 py-2 flex flex-wrap items-center gap-1.5" id="match-pills"></div>
</div>
<div id="filter-section" style="position:fixed;left:0;right:0;z-index:40;background:var(--bg);border-bottom:1px solid var(--border-2)">
  <div class="max-w-[960px] mx-auto px-4 pt-3 pb-2">
  <div class="flex items-stretch gap-1.5">
    <div class="flex gap-1.5" id="global-filter-bar"></div>
    <div class="shrink-0" style="width:1px;background:#222222"></div>
    <button id="ou-toggle" onclick="cycleDirection()" class="mono shrink-0"

    <button id="venue-toggle" onclick="cycleVenue()" class="mono shrink-0"
      style="font-size:10px;font-weight:700;line-height:1;padding:0;height:24px;width:44px;text-align:center;border:2px solid var(--gold);background:var(--surface);color:var(--gold);cursor:pointer;outline:none;text-transform:uppercase;user-select:none">H&A</button>
  </div>
  <span class="filter-status-global mono mt-1 block" style="font-size:10px;color:var(--muted)"></span>
  </div>
</div>

<div id="info-backdrop" onclick="hideInfoModal()"></div>
<div id="info-modal"></div>

<div id="retro-loader">
  <div class="rl-line1">NOW LOADING</div>
  <div class="rl-line2">DO NOT TURN OFF THE POWER</div>
</div>

<main class="max-w-[960px] mx-auto px-4 pb-5 space-y-3" id="content"></main>

<div style="height:3px;background:#222222"></div>
<footer class="max-w-[960px] mx-auto px-4 pb-6 text-center mono" style="font-size:10px;font-weight:700;letter-spacing:2px;line-height:2.5;text-transform:uppercase">
  <span style="color:var(--muted)">¡Dale, dale, dale, no pierdas el tino!</span>
</footer>

let _infoModalCol  = null
let _infoModalPage = 0

function _renderInfoModal() {
  const info  = COLUMN_INFO[_infoModalCol]
  if (!info) return
  const modal = document.getElementById('info-modal')
  const pages = info.pages
  const rows  = pages ? pages[_infoModalPage] : info.rows
  const rowsHtml = rows.map(r => r[0] === 'sep'
    ? `<div class="im-sep"></div>`
    : `<div class="im-line${r[0] === 'hi' ? ' hi' : ''}">${r[1]}</div>`
  ).join('')
  const navHtml = pages ? `
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:4px">
      <button onclick="stepInfoModal(-1)" style="font-family:'Press Start 2P',monospace;font-size:8px;background:none;border:2px solid var(--border);color:${_infoModalPage === 0 ? 'var(--border)' : 'var(--muted)'};padding:4px 8px;cursor:${_infoModalPage === 0 ? 'default' : 'pointer'}">◀</button>
      <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted)">${_infoModalPage + 1} / ${pages.length}</span>
      <button onclick="stepInfoModal(1)" style="font-family:'Press Start 2P',monospace;font-size:8px;background:none;border:2px solid var(--border);color:${_infoModalPage === pages.length - 1 ? 'var(--border)' : 'var(--muted)'};padding:4px 8px;cursor:${_infoModalPage === pages.length - 1 ? 'default' : 'pointer'}">▶</button>
    </div>` : ''
  modal.innerHTML = `<div class="im-title">${info.title}</div>${rowsHtml}${navHtml}`
}

function showInfoModal(col, propType) {
  const key = propType && COLUMN_INFO[col + '_' + propType] ? col + '_' + propType : col
  if (!COLUMN_INFO[key]) return
  _infoModalCol  = key
  _infoModalPage = 0
  _renderInfoModal()
  document.getElementById('info-modal').classList.add('visible')
  document.getElementById('info-backdrop').classList.add('visible')
}

function stepInfoModal(dir) {
  const info = COLUMN_INFO[_infoModalCol]
  if (!info?.pages) return
  _infoModalPage = Math.max(0, Math.min(info.pages.length - 1, _infoModalPage + dir))
  _renderInfoModal()
}

function hideInfoModal() {
  document.getElementById('info-modal').classList.remove('visible')
  document.getElementById('info-backdrop').classList.remove('visible')
}

function toSlug(name) {
  return (name || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/gi, '_')
}
function stripAccents(name) {
  return (name || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '')
}
function titleCase(str) {
  return str.replace(/\b[a-z]/g, c => c.toUpperCase())
}
function imgCandidates(name) {
  const clean = (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/-/g, ' ').replace(/[^a-z\s]/g, '').trim()
  const seen = new Set()
  const candidates = []
  const add = (n) => {
    const s = toSlug(n); if (s && !seen.has(s)) { seen.add(s); candidates.push(s) }
    const sl = s?.toLowerCase(); if (sl && !seen.has(sl)) { seen.add(sl); candidates.push(sl) }
  }

  // 1. Original as-is (preserves Codere casing)
  add(name)
  // 2. Periods/hyphens stripped (handles C.J. → CJ, Hye-seong → Hyeseong, etc.)
  const noPeriods = (name || '').replace(/\./g, '')
  const noHyphens = (name || '').replace(/-/g, '')
  const noSpecial = (name || '').replace(/[.\-]/g, '')
  add(noPeriods); add(noHyphens); add(noSpecial)
  // 3. Accent-stripped
  add(stripAccents(name))
  add(stripAccents(noSpecial))
  // 3. Word-level accent restoration (e.g. "diaz" → "díaz")
  const tokens = clean.split(' ')
  const reaccented = tokens.map(t => ACCENT_MAP[t] ?? t).join(' ')
  if (reaccented !== clean) { add(titleCase(reaccented)); add(titleCase(stripAccents(reaccented))) }
  // 4. Override → title-cased
  if (IMG_OVERRIDES[clean]) {
    const ov = IMG_OVERRIDES[clean]
    const ovAcc = ov.split(' ').map(t => ACCENT_MAP[t] ?? t).join(' ')
    add(titleCase(ovAcc))
    add(titleCase(ov))
    add(titleCase(stripAccents(ov)))
  }
  // 5. First-name alias substitutions → title-cased to match image filenames
  for (const [i, tok] of tokens.entries()) {
    const aliases = IMG_ALIASES[tok]
    if (!aliases) continue
    for (const alias of aliases) {
      const alt = [...tokens.slice(0, i), alias, ...tokens.slice(i + 1)].join(' ')
      const altAcc = alt.split(' ').map(t => ACCENT_MAP[t] ?? t).join(' ')
      add(titleCase(altAcc))
      add(titleCase(alt))
      add(titleCase(stripAccents(alt)))
    }
  }
  return candidates
}

function punkImgFallback(img, alts) {
  if (!alts.length) { img.onerror = null; img.src = 'mlb-punks/fallback.png'; return }
  const next = alts.shift()
  img.onerror = () => punkImgFallback(img, alts)
  img.src = `mlb-punks/${next}.png`
}

function punkImg(name) {
  const [first, ...rest] = imgCandidates(name)
  const altsJson = JSON.stringify(rest).replace(/"/g, '&quot;')

}

function age(birthDate) {
  if (!birthDate) return ''
  const bd  = new Date(birthDate)
  const now = new Date()
  let a = now.getUTCFullYear() - bd.getUTCFullYear()
  const m = now.getUTCMonth() - bd.getUTCMonth()
  if (m < 0 || (m === 0 && now.getUTCDate() < bd.getUTCDate())) a--
  return a
}

// ── Poisson EV helpers ───────────────────────────────────────────────────────

function poissonProb(lambda, line) {
  // P(X > line) for X ~ Poisson(lambda)
  if (lambda == null || lambda <= 0) return null
  const k = Math.floor(line)
  let cdf = 0, term = Math.exp(-lambda)
  for (let i = 0; i <= k; i++) {
    cdf += term
    term *= lambda / (i + 1)
  }
  return Math.min(Math.max(1 - cdf, 0), 1)
}

// ── Binomial EV helpers ──────────────────────────────────────────────────────

function binomCoeff(n, k) {
  if (k > n || k < 0) return 0
  if (k === 0 || k === n) return 1
  if (k > n - k) k = n - k
  let r = 1
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1)
  return r
}

function binomCDF(k, n, p) {
  // P(X <= k) for X ~ Binomial(n, p)
  if (p <= 0) return k >= 0 ? 1 : 0
  if (p >= 1) return k >= n ? 1 : 0
  let sum = 0
  for (let i = 0; i <= Math.min(k, n); i++) {
    sum += binomCoeff(n, i) * Math.pow(p, i) * Math.pow(1 - p, n - i)
  }
  return Math.min(sum, 1)
}

function computeEV(avg, abAvgPerGame, line, direction, overUs, underUs, propType = 'hits') {
  if (avg == null || line == null) return null
  if (overUs == null && underUs == null) return null

  // No-vig implied probabilities
  const rawOver  = impliedProb(overUs)
  const rawUnder = impliedProb(underUs)
  if (rawOver == null) return null
  // No-under market (e.g. HR): use raw implied directly, no devigging
  const mktOver   = rawUnder != null ? rawOver / (rawOver + rawUnder) : rawOver
  const mktUnder  = rawUnder != null ? rawUnder / (rawOver + rawUnder) : 1 - rawOver
  const modelProb = direction === 'under' ? mktUnder : mktOver

  let trueProb
  if (propType === 'strikeouts' || propType === 'runs' || propType === 'rbi' || propType === 'bases' || propType === 'hr' || propType === 'singles' || propType === 'doubles' || propType === 'pitcher_outs' || propType === 'hrr') {
    // Poisson model: lambda = stat/game avg
    const pOver = poissonProb(avg, line)
    if (pOver == null) return null
    trueProb = direction === 'under' ? 1 - pOver : pOver
  } else {
    // Binomial model: n = floored AB avg, p = batting avg
    if (abAvgPerGame == null) return null
    const n = Math.floor(abAvgPerGame)
    if (n <= 0) return null
    const p   = Math.min(Math.max(avg, 0), 1)
    const cdf = binomCDF(Math.floor(line), n, p)
    trueProb = direction === 'under' ? cdf : 1 - cdf
  }

  return trueProb - modelProb
}

// ── Venue-filtered stat computation (mirrors expansion bar logic) ────────────

function computeVenueStats(norm, filterKey, cache, seasonId, entry, propType = 'hits', line = 0.5) {
  const games         = cache?.normNameToGames?.[`${norm}__${propType}`] ?? []
  const playerTeamUid = cache?.playerTeamUids?.[norm]  ?? null

  // Exclude non-starts for strikeouts/pitcher_outs; exclude 0-AB games for hitting props
  let filtered = (propType === 'strikeouts' || propType === 'pitcher_outs')
    ? games.filter(g => {
        const gs = g.stats?.pitching_overall_games_started
        return gs != null ? gs === 1 : (g.stats?.pitching_overall_innings_pitched ?? 0) > 0
      })
    : games.filter(g => (g.stats?.hitting_at_bats ?? 0) > 0)

  // VS: restrict to upcoming opponent
  if (filterKey === 'VS') {
    const mHomeUid   = entry?.match?.home_team_uid
    const mAwayUid   = entry?.match?.away_team_uid
    const upcomingOpp = playerTeamUid === mHomeUid ? mAwayUid
                      : playerTeamUid === mAwayUid ? mHomeUid
                      : mHomeUid ?? null
    if (upcomingOpp != null) {
      filtered = filtered.filter(g => {
        const gTeam  = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
        const oppUid = gTeam === g.homeTeamUid ? g.awayTeamUid
                     : gTeam === g.awayTeamUid ? g.homeTeamUid : null
        return oppUid === upcomingOpp
      })
    }
  }

  // Venue filter
  if (activeVenue !== 'both') {
    filtered = filtered.filter(g => {
      const gTeam  = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
      const isHome = gTeam != null ? g.homeTeamUid === gTeam : null
      if (isHome === null) return true
      return activeVenue === 'home' ? isHome : !isHome
    })
  }

  // Apply filter window
  const allSeasonIds = [...new Set(filtered.map(g => g.season_id).filter(Boolean))].sort((a, b) => a - b)
  const curSeasonIdx = allSeasonIds.indexOf(seasonId)
  const lastSeasonId = curSeasonIdx > 0 ? allSeasonIds[curSeasonIdx - 1] : null

  let windowGames
  if      (filterKey === 'CS') windowGames = filtered.filter(g => g.season_id === seasonId)
  else if (filterKey === 'LS') windowGames = filtered.filter(g => g.season_id === lastSeasonId)
  else if (filterKey === 'VS' || filterKey === 'DB') windowGames = filtered
  else { const N = parseInt(filterKey.slice(1)); windowGames = filtered.slice(0, N) }

  const gc = windowGames.length
  if (gc === 0) return { avg: null, avg_ab_per_game: null, games_count: 0, games_with_hit: 0 }

  if (propType === 'strikeouts') {
    const totalSO = windowGames.reduce((s, g) => s + Number(g.stats?.pitching_overall_total_strikeouts ?? 0), 0)
    const totalIP = windowGames.reduce((s, g) => s + Number(g.stats?.pitching_overall_innings_pitched  ?? 0), 0)
    const gwh     = windowGames.filter(g => Number(g.stats?.pitching_overall_total_strikeouts ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalSO / gc : null,
      avg_ab_per_game: totalIP / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'pitcher_outs') {
    const totalOuts = windowGames.reduce((s, g) => s + Number(g.stats?.pitcher_outs_computed ?? 0), 0)
    const gwh       = windowGames.filter(g => Number(g.stats?.pitcher_outs_computed ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalOuts / gc : null,
      avg_ab_per_game: null,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'runs') {
    const totalRuns = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_total_runs_scored ?? 0), 0)
    const totalAB   = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats    ?? 0), 0)
    const gwh       = windowGames.filter(g => Number(g.stats?.hitting_total_runs_scored ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalRuns / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'rbi') {
    const totalRbi = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_runs_batted_in ?? 0), 0)
    const totalAB  = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh      = windowGames.filter(g => Number(g.stats?.hitting_runs_batted_in ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalRbi / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'bases') {
    const totalBases = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_total_bases ?? 0), 0)
    const totalAB    = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh        = windowGames.filter(g => Number(g.stats?.hitting_total_bases ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalBases / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'hr') {
    const totalHR = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_home_runs ?? 0), 0)
    const totalAB = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh     = windowGames.filter(g => Number(g.stats?.hitting_home_runs ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalHR / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'singles') {
    const totalS  = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_singles ?? 0), 0)
    const totalAB = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh     = windowGames.filter(g => Number(g.stats?.hitting_singles ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalS / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'doubles') {
    const totalD  = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_doubles ?? 0), 0)
    const totalAB = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh     = windowGames.filter(g => Number(g.stats?.hitting_doubles ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalD / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  if (propType === 'hrr') {
    const totalHRR = windowGames.reduce((s, g) =>
      s + Number(g.stats?.hrr_computed ?? 0), 0)
    const totalAB  = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
    const gwh      = windowGames.filter(g => Number(g.stats?.hrr_computed ?? 0) > line).length
    return {
      avg:             gc > 0 ? totalHRR / gc : null,
      avg_ab_per_game: totalAB / gc,
      games_count:     gc,
      games_with_hit:  gwh,
    }
  }

  const totalHits = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_hits    ?? 0), 0)
  const totalAB   = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
  const gwh       = windowGames.filter(g => Number(g.stats?.hitting_hits ?? 0) > 0).length

  return {
    avg:             totalAB > 0 ? totalHits / totalAB : null,
    avg_ab_per_game: totalAB / gc,
    games_count:     gc,
    games_with_hit:  gwh,
  }
}

// ── Render market tbody — reads from player_prop_cache via filterCache ──────

function renderMktTbodyContent(mktName, cache, filterKeys, entry) {
  if (!cache?.playerStats) {
    return `<tbody><tr><td colspan="6" style="padding:12px 10px;text-align:center;font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace">No cache data</td></tr></tbody>`
  }

  const propType  = mktPropType(mktName)
  const homeUid   = entry?.match?.home_team_uid
  const awayUid   = entry?.match?.away_team_uid
  const sortedFKs = sortFilterKeys(filterKeys)

  const passing = [], failing = []

  for (const [norm, propMap] of Object.entries(cache.playerStats)) {
    const filterMap = propMap[propType]
    if (!filterMap) continue
    const dbRow = filterMap['DB']
    if (!dbRow) continue

    // Use original display name from the cache row (normName key is lowercase)
    const playerName    = dbRow.player_name ?? norm
    const playerTeamUid = cache.playerTeamUids?.[norm]
    const teamKey       = playerTeamUid === homeUid ? 'home'
                        : playerTeamUid === awayUid ? 'away' : 'unknown'

    // Filtering
    const hasHistory   = (dbRow.games_count ?? 0) > 0
    const dirOdds      = activeDirection === 'under' ? dbRow.under_us_odds : dbRow.over_us_odds
    const shouldFilter = !hasHistory

    // Odds — switch with OVER/UNDER toggle; data-us allows mode cycling
    const overUs  = dbRow.over_us_odds
    const underUs = dbRow.under_us_odds
    const usOdds  = activeDirection === 'under' ? underUs : overUs
    const otherUs = activeDirection === 'under' ? overUs  : underUs
    const oddsStr = usOdds != null ? fmtOdds(usOdds, null) : '—'
    const oddsCol = usOdds == null ? 'var(--muted)' : usOdds > 0 ? 'var(--green)' : 'var(--magenta)'
    const lineVal = dbRow.line ?? 0.5

    // Player cell metadata
    const pos    = dbRow.position  ?? ''
    const ageStr = dbRow.birth_date ? age(dbRow.birth_date) + ' y/o' : ''
    const meta   = [pos, ageStr].filter(Boolean).join(' · ')

    const safeName = (playerName || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
    const safeMkt  = (mktName    || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
    const normMkt  = normName(mktName).replace(/'/g,"\\'")
    const seasonId = dbRow.season_id ?? 0
    const matchId  = entry?.matchId  ?? 0

    // Past match result — find actual game in game_logs matching this match's date + teams
    const isPast = isMatchOld(entry?.match?.match_date)
    let gameResult = null
    if (isPast) {
      const gDate   = dbRow.game_date ?? ''
      const allGames = cache.normNameToGames?.[`${norm}__${propType}`] ?? []
      const actual  = allGames.find(g =>
        g.match_date === gDate &&
        g.homeTeamUid === homeUid &&
        g.awayTeamUid === awayUid
      )
      if (actual) {
        const hits = Number(actual.stats?.hitting_hits ?? 0)
        const ab   = Number(actual.stats?.hitting_at_bats ?? 0)
        const so   = Number(actual.stats?.pitching_overall_total_strikeouts ?? 0)
        const r    = Number(actual.stats?.hitting_total_runs_scored ?? 0)
        const rbi  = Number(actual.stats?.hitting_runs_batted_in ?? 0)
        const tb   = Number(actual.stats?.hitting_total_bases ?? 0)
        const hr   = Number(actual.stats?.hitting_home_runs ?? 0)
        const s1   = Number(actual.stats?.hitting_singles ?? 0)
        const d2   = Number(actual.stats?.hitting_doubles ?? 0)
        const hrr  = (Number(actual.stats?.hitting_hits ?? 0))
                   + (Number(actual.stats?.hitting_total_runs_scored ?? 0))
                   + (Number(actual.stats?.hitting_runs_batted_in ?? 0))
        const po   = (() => {
          const ipStr = actual.stats?.pitching_overall_innings_pitched_formatted
          if (!ipStr) return 0
          const parts = String(ipStr).split('.')
          return (parseInt(parts[0]) || 0) * 3 + (parseInt(parts[1] ?? '0') || 0)
        })()
        gameResult = { hits, ab, so, r, rbi, tb, hr, s1, d2, po, hrr }
      }
    }
    const rowspan  = 1 + sortedFKs.length

    // Closure — colors assigned after sort so A/B matches final position
    const buildTrows = (normalBg, expandedBg) => {
      const playerCellHtml = `<td class="align-top select-none" rowspan="${rowspan}"
           style="padding:7px 10px;color:var(--text);vertical-align:top"
           data-player-exp="${norm}_${matchId}_${normMkt}"
           data-ab-bg="${expandedBg}"
           data-normal-bg="${normalBg}"
           onclick="var k='${norm}_${matchId}_${normMkt}';if(expansions.has(k)){event.stopPropagation();collapseExpansion(k)}"
           onmouseover="groupHover('${norm}_${matchId}_${normMkt}','#1e1e1e')"
           onmouseout="groupLeave('${norm}_${matchId}_${normMkt}')">
        <div style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:700;line-height:1.2;margin-bottom:4px">
          <span data-us="${usOdds ?? ''}" data-other-us="${otherUs ?? ''}" style="color:${oddsCol}">${oddsStr}</span><span style="color:var(--muted);font-size:10px;margin-left:5px">${activeDirection === 'under' ? '&lt;' : '&gt;'}${lineVal}</span>
        </div>
        <div style="display:flex;align-items:center">
          ${punkImg(playerName)}
          <span style="display:inline-flex;flex-direction:column;line-height:1.3">
            <span style="font-size:11px;font-weight:600">${playerName}</span>
            ${meta ? `<span style="font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace">${meta}</span>` : ''}
          </span>
        </div>
      </td>`

      return ['DB', ...sortedFKs].map((f, idx) => {
        const cRow        = filterMap[f]
        const filterLabel = f === 'DB' ? 'ALL' : (FILTER_LABELS[f] ?? f)

        const vs     = activeVenue !== 'both' ? computeVenueStats(norm, f, cache, seasonId, entry, propType, lineVal) : null
        const effRow = vs ?? cRow

        const evRaw = activeVenue !== 'both'
          ? computeEV(effRow?.avg, effRow?.avg_ab_per_game, lineVal, activeDirection, dbRow.over_us_odds, dbRow.under_us_odds, propType)
          : (activeDirection === 'under' ? cRow?.under_ev : cRow?.ev)
        const evPct = evRaw == null ? null : Math.round(evRaw * 1000) / 10
        const evStr = evPct == null ? '—' : (evPct > 0 ? `+${evPct.toFixed(1)}%` : `${evPct.toFixed(1)}%`)
        const evCol = evPct == null ? 'var(--muted)' : evPct > 0 ? 'var(--green)' : 'var(--magenta)'

        // For past matches, determine HIT/MISS from actual result
        let resultCell = `<td class="mono" style="padding:5px 10px;font-size:11px;font-weight:700;color:${evCol};white-space:nowrap;text-align:right;vertical-align:middle">${evStr}</td>`
        if (isPast && gameResult) {
          const actual = propType === 'strikeouts' ? gameResult.so : propType === 'runs' ? gameResult.r : propType === 'rbi' ? gameResult.rbi : propType === 'bases' ? gameResult.tb : propType === 'hr' ? gameResult.hr : propType === 'singles' ? gameResult.s1 : propType === 'doubles' ? gameResult.d2 : propType === 'pitcher_outs' ? gameResult.po : propType === 'hrr' ? gameResult.hrr : gameResult.hits
          const won = activeDirection === 'under' ? actual < lineVal : actual > lineVal
          const label = won ? 'WON' : 'LOST'
          const col   = won ? 'var(--green)' : 'var(--magenta)'
          const suffix = propType === 'strikeouts' ? 'K' : propType === 'runs' ? 'R' : propType === 'rbi' ? 'RBI' : propType === 'bases' ? 'TB' : propType === 'hr' ? 'HR' : propType === 'singles' ? '1B' : propType === 'doubles' ? '2B' : propType === 'pitcher_outs' ? 'OUT' : propType === 'hrr' ? 'HRR' : 'H'
          resultCell  = `<td class="mono" style="padding:5px 10px;font-size:10px;font-weight:700;color:${col};white-space:nowrap;text-align:right;vertical-align:middle;letter-spacing:0.08em">${label} <span style="font-size:9px;opacity:0.6">${actual}${suffix}</span></td>`
        } else if (isPast) {
          resultCell = `<td class="mono" style="padding:5px 10px;font-size:11px;color:var(--muted);text-align:right;vertical-align:middle">—</td>`
        }
        const avgRaw  = effRow?.avg
        const avgStr  = avgRaw != null
          ? (propType === 'strikeouts' || propType === 'runs' || propType === 'rbi' || propType === 'bases' || propType === 'hr' || propType === 'singles' || propType === 'doubles' || propType === 'pitcher_outs' || propType === 'hrr')
            ? propType === 'hr' ? avgRaw.toFixed(2) : avgRaw.toFixed(1)
            : avgRaw >= 1 ? '1.000' : `.${Math.round(avgRaw * 1000).toString().padStart(3,'0')}`
          : '—'
        const abStr = effRow?.avg_ab_per_game != null ? effRow.avg_ab_per_game.toFixed(1) : '—'

        const gc  = effRow?.games_count    ?? 0
        const gwh = effRow?.games_with_hit ?? 0
        const pct = gc > 0 ? Math.round(gwh / gc * 100) : 0
        const hStr = gc > 0 ? `${gwh}/${gc} <span style="color:var(--muted)">(${pct}%)</span>` : '—'

        const pcell     = idx === 0 ? playerCellHtml : ''
        const topBorder = idx === 0 ? 'border-top:1px solid #222;' : 'border-top:1px solid #1a1a1a;'

        return `<tr class="${shouldFilter ? 'filtered-row' : ''}"
          style="${shouldFilter ? 'display:none;' : ''}${topBorder}cursor:pointer;background:${normalBg}"
          onclick="handleRowClick(this,'${safeName}','${safeMkt}','${normMkt}',${lineVal},${matchId},${seasonId},'${f}')"
          onmouseover="groupHover('${norm}_${matchId}_${normMkt}','#1e1e1e')" onmouseout="groupLeave('${norm}_${matchId}_${normMkt}')">
          ${pcell}
          <td class="mono" style="padding:5px 10px;font-size:10px;font-weight:700;color:${filterLabel === 'ALL' ? 'var(--muted)' : 'var(--gold)'};text-transform:uppercase;letter-spacing:0.08em;text-align:center;vertical-align:middle">${filterLabel}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${avgStr}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${abStr}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${hStr}</td>
          ${resultCell}
        </tr>`
      }).join('')
    }

    const dbEv = activeDirection === 'under' ? dbRow.under_ev : dbRow.ev

    if (shouldFilter) failing.push({ buildTrows, teamKey })
    else              passing.push({ buildTrows, teamKey, dbEv })
  }

  // Sort by DB ev descending (best positive EV first, nulls last)
  passing.sort((a, b) => {
    if (a.dbEv == null && b.dbEv == null) return 0
    if (a.dbEv == null) return 1
    if (b.dbEv == null) return -1
    return b.dbEv - a.dbEv
  })

  // Group by home/away team (preserving EV sort order within each group)
  const byTeam = new Map()
  for (const e of passing) {
    if (!byTeam.has(e.teamKey)) byTeam.set(e.teamKey, [])
    byTeam.get(e.teamKey).push(e)
  }

  // Build flat render order (team-grouped) THEN assign A/B colors by render position
  const abColors = (i) => {
    const even = i % 2 === 0
    const normalBg = even ? '#111111' : '#1a1a1a'
    return { normalBg, expandedBg: normalBg }
  }
  let renderIdx = 0
  for (const entries of byTeam.values()) {
    for (const e of entries) {
      const { normalBg, expandedBg } = abColors(renderIdx++)
      e.trows = e.buildTrows(normalBg, expandedBg)
    }
  }

  let tbodys = ''
  for (const [key, entries] of byTeam) {
    const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
    const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
    tbodys += `<tbody>`
    if (teamLabel) {
      tbodys += `<tr>
        <td colspan="6" class="team-hdr" style="position:sticky;z-index:10;background:#0a0a0a;padding:6px 10px 2px;font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.12em">${teamLabel}</td>
      </tr>`
    }
    tbodys += entries.map(e => e.trows).join('')
    tbodys += `</tbody>`
  }

  if (failing.length) {
    tbodys += `<tbody>`
    tbodys += `<tr class="filter-summary-row cursor-pointer select-none" style="border-top:1px solid #222" onclick="toggleFilteredRows(this)">
      <td colspan="6" style="padding:6px 10px">
        <span class="filter-chev" style="font-size:10px;color:var(--muted)">▷ </span>
        <span style="font-size:11px;color:var(--muted)">${failing.length} filtered</span>
      </td>
    </tr>`
    const failByTeam = new Map()
    for (const e of failing) {
      if (!failByTeam.has(e.teamKey)) failByTeam.set(e.teamKey, [])
      failByTeam.get(e.teamKey).push(e)
    }
    // Assign A/B for failing section separately, resetting counter
    let failIdx = 0
    for (const entries of failByTeam.values()) {
      for (const e of entries) {
        const { normalBg, expandedBg } = abColors(failIdx++)
        e.trows = e.buildTrows(normalBg, expandedBg)
      }
    }
    for (const [key, entries] of failByTeam) {
      const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
      const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
      if (teamLabel) {
        tbodys += `<tr class="filtered-row" style="display:none;border-top:1px solid #222">
          <td colspan="6" style="background:#0a0a0a;padding:6px 10px 2px;font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.12em">${teamLabel}</td>
        </tr>`
      }
      tbodys += entries.map(p => p.trows).join('')
    }
    tbodys += `</tbody>`
  }

  return tbodys
}

function groupHover(key, bg) {
  const ptd = document.querySelector(`[data-player-exp="${key}"]`)
  if (!ptd) return
  let r = ptd.closest('tr')
  const rs = ptd.rowSpan || 1
  for (let i = 0; i < rs; i++) { if (r) { r.style.background = bg; r = r.nextElementSibling } }
}
function groupLeave(key) {
  const ptd = document.querySelector(`[data-player-exp="${key}"]`)
  if (!ptd) return
  const normalBg = ptd.dataset.normalBg || ''
  const expandedBg = ptd.dataset.abBg || ''
  let r = ptd.closest('tr')
  const rs = ptd.rowSpan || 1
  for (let i = 0; i < rs; i++) {
    if (r) { r.style.background = r.classList.contains('row-expanded') ? expandedBg : normalBg; r = r.nextElementSibling }
  }
}

function toggleFilteredRows(el) {
  const row    = el.closest('tr')
  const tbody  = row.closest('tbody')
  const chevEl = row.querySelector('.filter-chev')
  const rows   = [...tbody.querySelectorAll('tr.filtered-row')]
  const hidden = rows[0]?.style.display === 'none'
  rows.forEach(r => { r.style.display = hidden ? '' : 'none' })
  if (chevEl) chevEl.textContent = hidden ? '▽ ' : '▷ '
}

// ── Filter state ────────────────────────────────────────────────────────────
let activeFilters   = new Set()       // L3/L6/L9/L12/CS/VS — empty = only ALL shown
let activeDirection = 'over'          // 'over' | 'under'
let activeVenue     = 'both'          // 'both' | 'home' | 'away'
let filterCache     = {}              // matchId → { normNameToGames, teamsInfoByMid, playerStats, playerTeamUids }

function filterBtnClass() {
  return `mono outline-none focus:outline-none cursor-pointer`
}
function filterBtnStyle(isActive) {
  const base = `font-size:10px;font-weight:700;line-height:1;padding:0;height:24px;width:44px;text-align:center;border:2px solid;background:var(--surface);cursor:pointer;user-select:none`
  return isActive
    ? `${base};border-color:var(--gold);color:var(--gold)`
    : `${base};border-color:var(--border);color:var(--muted)`
}


function updateOUToggle() {
  const btn = document.getElementById('ou-toggle')
  if (!btn) return
  const s = `font-size:10px;font-weight:700;line-height:1;padding:0;height:24px;width:44px;text-align:center;border:2px solid;background:var(--surface);cursor:pointer;outline:none;text-transform:uppercase;font-family:'Geist Mono',monospace`
  btn.style.cssText = `${s};border-color:var(--gold);color:var(--gold)`
  btn.textContent = activeDirection === 'under' ? 'UNDR' : 'OVER'
}

function cycleDirection() {
  activeDirection = activeDirection === 'over' ? 'under' : 'over'
  updateOUToggle()
  refreshMktTbodies([...activeFilters])
  for (const [key, exp] of expansions) {
    exp.lockedDirection = activeDirection
    renderExpansionContent(key)
  }
}

function updateVenueToggle() {
  const btn = document.getElementById('venue-toggle')
  if (!btn) return
  const s = `font-size:10px;font-weight:700;line-height:1;padding:0;height:24px;width:44px;text-align:center;border:2px solid;background:var(--surface);cursor:pointer;outline:none;text-transform:uppercase;font-family:'Geist Mono',monospace;user-select:none`
  btn.style.cssText = `${s};border-color:var(--gold);color:var(--gold)`
  btn.textContent = activeVenue === 'home' ? 'HOME' : activeVenue === 'away' ? 'AWAY' : 'H&A'
}

function cycleVenue() {
  activeVenue = activeVenue === 'both' ? 'home' : activeVenue === 'home' ? 'away' : 'both'
  updateVenueToggle()
  refreshMktTbodies([...activeFilters])
  for (const [key, exp] of expansions) {
    exp.barPage = null
    renderExpansionContent(key)
  }
}

const FILTER_ORDER  = ['L5','L10','L30','CS','LS','VS']
const FILTER_LABELS = { LS: "'25" }
function sortFilterKeys(keys) {
  return [...keys].sort((a, b) => FILTER_ORDER.indexOf(a) - FILTER_ORDER.indexOf(b))
}

function filterBtnHtml(f) {
  const active = activeFilters.has(f)
  return `<button onclick="selectFilter('${f}')" data-filter="${f}" ${active ? 'data-active="1"' : ''}
    class="${filterBtnClass()}" style="${filterBtnStyle(active)}"
    onmouseover="if(!this.dataset.active){this.style.borderColor='var(--gold)';this.style.color='var(--gold)'}"
    onmouseout="if(!this.dataset.active){this.style.borderColor='var(--border)';this.style.color='var(--muted)'}">
    ${FILTER_LABELS[f] ?? f}
  </button>`
}

function renderGlobalFilterBar() {
  document.getElementById('global-filter-bar').innerHTML =
    ['L5','L10','L30'].map(f => filterBtnHtml(f)).join('') +
    `<div style="width:1px;background:#222222;flex-shrink:0"></div>` +
    ['CS','LS','VS'].map(f => filterBtnHtml(f)).join('')
}

function updateGlobalFilterButtons() {
  document.querySelectorAll('#global-filter-bar [data-filter]').forEach(btn => {
    const f      = btn.dataset.filter
    const active = activeFilters.has(f)
    btn.className    = filterBtnClass()
    btn.style.cssText = filterBtnStyle(active)
    btn.textContent  = FILTER_LABELS[f] ?? f
    active ? btn.setAttribute('data-active','1') : btn.removeAttribute('data-active')
    btn.removeAttribute('data-pinned')
  })

function setGlobalFilterStatus(msg) {
  const el = document.querySelector('.filter-status-global')
  if (el) el.textContent = msg
}

function refreshMktTbodies(filterKeys) {
  filterKeys = sortFilterKeys(filterKeys)
  for (const entry of allMatches) {
    const card = document.querySelector(`[data-match-id="${entry.matchId}"]`)
    if (!card) continue
    const cache = filterCache[entry.matchId] ?? null
    card.querySelectorAll('table[data-mkt]').forEach(table => {
      const normMkt = table.dataset.mkt
      const mktName = Object.keys(entry.markets).find(k => normName(k) === normMkt)
      if (!mktName) return
      table.querySelectorAll('tbody').forEach(b => b.remove())
      table.insertAdjacentHTML('beforeend', renderMktTbodyContent(mktName, cache, filterKeys, entry))
    })

  reinstateExpansion()

function applyFilters() {

  updateOUToggle()
  refreshMktTbodies([...activeFilters])

function selectFilter(f) {

  else                      activeFilters.add(f)

}
