function toSlug(name) {
  return (name || '').replace(/[^a-z0-9]/gi, '_')
}
function stripAccents(name) {
  return (name || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '')
}
function titleCase(str) {
  return str.replace(/\b[a-z]/g, c => c.toUpperCase())
}
function imgCandidates(name) {
  const clean = (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/-/g, ' ').replace(/[^a-z\s]/g, '').trim()
  const seen = new Set()
  const candidates = []
  const add = (n) => {
    const s = toSlug(n); if (s && !seen.has(s)) { seen.add(s); candidates.push(s) }
    const sl = s?.toLowerCase(); if (sl && !seen.has(sl)) { seen.add(sl); candidates.push(sl) }
  }

  // 1. Original as-is (preserves Codere casing)
  add(name)
  // 2. Periods/hyphens stripped (handles C.J. → CJ, Hye-seong → Hyeseong, etc.)
  const noPeriods = (name || '').replace(/\./g, '')
  const noHyphens = (name || '').replace(/-/g, '')
  const noSpecial = (name || '').replace(/[.\-]/g, '')
  add(noPeriods); add(noHyphens); add(noSpecial)
  // 3. Accent-stripped
  add(stripAccents(name))
  add(stripAccents(noSpecial))
  // 3. Word-level accent restoration (e.g. "diaz" → "díaz")
  const tokens = clean.split(' ')
  const reaccented = tokens.map(t => ACCENT_MAP[t] ?? t).join(' ')
  if (reaccented !== clean) { add(titleCase(reaccented)); add(titleCase(stripAccents(reaccented))) }
  // 4. Override → title-cased
  if (IMG_OVERRIDES[clean]) {
    const ov = IMG_OVERRIDES[clean]
    const ovAcc = ov.split(' ').map(t => ACCENT_MAP[t] ?? t).join(' ')
    add(titleCase(ovAcc))
    add(titleCase(ov))
    add(titleCase(stripAccents(ov)))
  }
  // 5. First-name alias substitutions → title-cased to match image filenames
  for (const [i, tok] of tokens.entries()) {
    const aliases = IMG_ALIASES[tok]
    if (!aliases) continue
    for (const alias of aliases) {
      const alt = [...tokens.slice(0, i), alias, ...tokens.slice(i + 1)].join(' ')
      const altAcc = alt.split(' ').map(t => ACCENT_MAP[t] ?? t).join(' ')
      add(titleCase(altAcc))
      add(titleCase(alt))
      add(titleCase(stripAccents(alt)))
    }
  }
  return candidates
}

function punkImgFallback(img, alts) {
  if (!alts.length) { img.onerror = null; img.src = 'mlb-punks/fallback.png'; return }
  const next = alts.shift()
  img.onerror = () => punkImgFallback(img, alts)
  img.src = `mlb-punks/${next}.png`
}

function punkImg(name) {
  const [first, ...rest] = imgCandidates(name)
  const altsJson = JSON.stringify(rest).replace(/"/g, '&quot;')
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#2a2a2a;border:1px solid #3a3a3a;flex-shrink:0;margin-right:6px;vertical-align:middle"><img src="mlb-punks/${first}.png" style="height:32px;width:32px;object-fit:contain;image-rendering:pixelated;display:block;" onerror="punkImgFallback(this,JSON.parse(this.dataset.alts))" data-alts="${altsJson}"></span>`
}

const MODES = [
  { id: 'US',  label: 'US',  },
  { id: 'Dec', label: 'Dec', },
  { id: 'Pct', label: '%',   },
  { id: '$',   label: '$',   },
]
let modeIdx = 0

function cycleMode() {
  modeIdx = (modeIdx + 1) % MODES.length
  document.getElementById('mode-btn').textContent = MODES[modeIdx].label
  document.getElementById('bet-wrapper').style.display = MODES[modeIdx].id === '$' ? 'flex' : 'none'
  updateOddsInPlace()
}

function updateOddsInPlace() {
  document.querySelectorAll('[data-us]').forEach(el => {
    const us      = el.dataset.us      === '' ? null : Number(el.dataset.us)
    const otherUs = el.dataset.otherUs === '' ? null : Number(el.dataset.otherUs)
    el.innerHTML  = fmtOdds(us, otherUs)
    el.style.color = us == null ? 'var(--muted)' : us > 0 ? 'var(--green)' : 'var(--magenta)'
  })
}

function betAmt() {
  return Math.max(1, Number(document.getElementById('bet-amt').value) || 100)
}

function fmtOdds(us, otherUs) {
  if (us == null) return '—'
  const mode = MODES[modeIdx].id
  if (mode === 'US')  return us > 0 ? `+${us}` : String(us)
  if (mode === 'Dec') { const dec = us > 0 ? us/100+1 : 100/Math.abs(us)+1; return `${dec.toFixed(2)}×` }
  if (mode === 'Pct') {
    const imp = us > 0 ? 100/(us+100)*100 : Math.abs(us)/(Math.abs(us)+100)*100
    if (otherUs != null) {
      const otherImp = otherUs > 0 ? 100/(otherUs+100)*100 : Math.abs(otherUs)/(Math.abs(otherUs)+100)*100
      const trueProb = imp / (imp + otherImp) * 100
      return `${imp.toFixed(1)}% <span style="color:var(--muted);font-size:10px">(${trueProb.toFixed(1)}%)</span>`
    }
    return `${imp.toFixed(1)}%`
  }
  if (mode === '$') { const p = us > 0 ? betAmt()*us/100 : betAmt()*100/Math.abs(us); return `$${p.toFixed(0)}` }
}

function age(birthDate) {
  if (!birthDate) return ''
  const bd  = new Date(birthDate)
  const now = new Date()
  let a = now.getUTCFullYear() - bd.getUTCFullYear()
  const m = now.getUTCMonth() - bd.getUTCMonth()
  if (m < 0 || (m === 0 && now.getUTCDate() < bd.getUTCDate())) a--
  return a
}

// ── Name / team helpers ──────────────────────────────────────────────────────

const TWO_WORD_CITIES = ['Kansas City','San Francisco','New York','Los Angeles','St. Louis','Tampa Bay','New Orleans','Golden State','Oklahoma City','San Antonio','San Diego','Green Bay','Las Vegas','San Jose','New Jersey']
function teamNick(name) {
  if (!name) return '?'
  const norm = name.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  for (const c of TWO_WORD_CITIES) {
    if (norm.startsWith(c + ' ')) return name.slice(c.length + 1)
  }
  return name.split(' ').slice(1).join(' ') || name
}


function normName(n) {
  return (n || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/-/g, ' ')
    .replace(/[^a-z\s]/g, '')
    .trim().split(/\s+/).sort().join(' ')
}

function tokenMatch(a, b) {
  if (a === b) return true
  if (a.length === 1 && b.startsWith(a)) return true
  if (b.length === 1 && a.startsWith(b)) return true
  const m = Math.min(a.length, b.length)
  return m >= 3 && (a.startsWith(b) || b.startsWith(a))
}

function mktToStatKey(mktName) {
  const m = mktName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  if (m.includes('pitcher') && m.includes('strikeout')) return 'pitching_overall_total_strikeouts'
  if (m.includes('strikeout'))  return 'hitting_total_strikeouts'
  if (m.includes('hit'))        return 'hitting_hits'
  if (m.includes('base'))       return 'hitting_total_bases'
  if (m.includes('run'))        return 'hitting_total_runs_scored'
  return null
}

function impliedProb(us) {
  if (us == null) return null
  return us < 0 ? Math.abs(us) / (Math.abs(us) + 100) : 100 / (us + 100)
}

function cleanMktName(name) {
  return name
    .replace(/\s+DEL\s+BATEADOR/gi, '')
    .replace(/\s*\(INCL\.?\s*EXTRA\s*INNINGS\)/gi, '')
    .replace(/\s+M[AÁ]S\s+DE\s*[\/]\s*MENOS\s+DE/gi, ' OVER/UNDER')
    .replace(/\s+M[AÁ]S\s+DE\s+MENOS\s+DE/gi, ' OVER/UNDER')
    .replace(/\s+M[AÁ]S\s+DE/gi, ' OVER')
    .replace(/\s+MENOS\s+DE/gi, ' UNDER')
    .trim()
}

function mktSubtitle(name, playerCount) {
  const m = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  let desc = 'Player props'
  if (m.includes('pitcher') && m.includes('strikeout')) desc = 'Pitcher strikeout props'
  else if (m.includes('strikeout'))  desc = 'Batter strikeout props'
  else if (m.includes('hit'))        desc = 'Player hit props'
  else if (m.includes('base'))       desc = 'Total bases props'
  else if (m.includes('run'))        desc = 'Runs scored props'
  else if (m.includes('rbi'))        desc = 'RBI props'
  else if (m.includes('home run'))   desc = 'Home run props'
  return `${desc} · ${playerCount} lines`
}

// ── Binomial EV helpers ──────────────────────────────────────────────────────

function binomCoeff(n, k) {
  if (k > n || k < 0) return 0
  if (k === 0 || k === n) return 1
  if (k > n - k) k = n - k
  let r = 1
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1)
  return r
}

function binomCDF(k, n, p) {
  // P(X <= k) for X ~ Binomial(n, p)
  if (p <= 0) return k >= 0 ? 1 : 0
  if (p >= 1) return k >= n ? 1 : 0
  let sum = 0
  for (let i = 0; i <= Math.min(k, n); i++) {
    sum += binomCoeff(n, i) * Math.pow(p, i) * Math.pow(1 - p, n - i)
  }
  return Math.min(sum, 1)
}

function computeEV(avg, abAvgPerGame, line, direction, overUs, underUs) {
  if (avg == null || abAvgPerGame == null || line == null) return null
  if (overUs == null && underUs == null) return null

  // No-vig implied probabilities
  const rawOver  = impliedProb(overUs)
  const rawUnder = impliedProb(underUs)
  if (rawOver == null || rawUnder == null) return null
  const total      = rawOver + rawUnder
  const modelProb  = direction === 'under' ? rawUnder / total : rawOver / total

  // Binomial true probability: n = rounded AB avg, p = batting avg
  const n = Math.round(abAvgPerGame)
  if (n <= 0) return null
  const p    = Math.min(Math.max(avg, 0), 1)
  const cdf  = binomCDF(Math.floor(line), n, p)
  const trueProb = direction === 'under' ? cdf : 1 - cdf

  return trueProb - modelProb
}

// ── Venue-filtered stat computation (mirrors expansion bar logic) ────────────

function computeVenueStats(norm, filterKey, cache, seasonId, entry) {
  const games         = cache?.normNameToGames?.[norm] ?? []
  const playerTeamUid = cache?.playerTeamUids?.[norm]  ?? null

  // Exclude 0-AB games (hits market)
  let filtered = games.filter(g => (g.stats?.hitting_at_bats ?? 0) > 0)

  // VS: restrict to upcoming opponent
  if (filterKey === 'VS') {
    const mHomeUid   = entry?.match?.home_team_uid
    const mAwayUid   = entry?.match?.away_team_uid
    const upcomingOpp = playerTeamUid === mHomeUid ? mAwayUid
                      : playerTeamUid === mAwayUid ? mHomeUid
                      : mHomeUid ?? null
    if (upcomingOpp != null) {
      filtered = filtered.filter(g => {
        const gTeam  = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
        const oppUid = gTeam === g.homeTeamUid ? g.awayTeamUid
                     : gTeam === g.awayTeamUid ? g.homeTeamUid : null
        return oppUid === upcomingOpp
      })
    }
  }

  // Venue filter
  if (activeVenue !== 'both') {
    filtered = filtered.filter(g => {
      const gTeam  = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
      const isHome = gTeam != null ? g.homeTeamUid === gTeam : null
      if (isHome === null) return true
      return activeVenue === 'home' ? isHome : !isHome
    })
  }

  // Apply filter window
  const allSeasonIds = [...new Set(filtered.map(g => g.season_id).filter(Boolean))].sort((a, b) => a - b)
  const curSeasonIdx = allSeasonIds.indexOf(seasonId)
  const lastSeasonId = curSeasonIdx > 0 ? allSeasonIds[curSeasonIdx - 1] : null

  let windowGames
  if      (filterKey === 'CS') windowGames = filtered.filter(g => g.season_id === seasonId)
  else if (filterKey === 'LS') windowGames = filtered.filter(g => g.season_id === lastSeasonId)
  else if (filterKey === 'VS' || filterKey === 'DB') windowGames = filtered
  else { const N = parseInt(filterKey.slice(1)); windowGames = filtered.slice(0, N) }

  const gc = windowGames.length
  if (gc === 0) return { avg: null, avg_ab_per_game: null, games_count: 0, games_with_hit: 0 }

  const totalHits = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_hits    ?? 0), 0)
  const totalAB   = windowGames.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
  const gwh       = windowGames.filter(g => Number(g.stats?.hitting_hits ?? 0) > 0).length

  return {
    avg:             totalAB > 0 ? totalHits / totalAB : null,
    avg_ab_per_game: totalAB / gc,
    games_count:     gc,
    games_with_hit:  gwh,
  }
}

// ── Render market tbody — reads from player_prop_cache via filterCache ──────

function renderMktTbodyContent(mktName, cache, filterKeys, entry) {
  if (!cache?.playerStats) {
    return `<tbody><tr><td colspan="6" style="padding:12px 10px;text-align:center;font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace">No cache data</td></tr></tbody>`
  }

  const homeUid   = entry?.match?.home_team_uid
  const awayUid   = entry?.match?.away_team_uid
  const sortedFKs = sortFilterKeys(filterKeys)

  const passing = [], failing = []

  for (const [norm, filterMap] of Object.entries(cache.playerStats)) {
    const dbRow = filterMap['DB']
    if (!dbRow) continue

    // Use original display name from the cache row (normName key is lowercase)
    const playerName    = dbRow.player_name ?? norm
    const playerTeamUid = cache.playerTeamUids?.[norm]
    const teamKey       = playerTeamUid === homeUid ? 'home'
                        : playerTeamUid === awayUid ? 'away' : 'unknown'

    // Filtering
    const hasHistory   = (dbRow.games_count ?? 0) > 0
    const dirOdds      = activeDirection === 'under' ? dbRow.under_us_odds : dbRow.over_us_odds
    const shouldFilter = !hasHistory

    // Odds — switch with OVER/UNDER toggle; data-us allows mode cycling
    const overUs  = dbRow.over_us_odds
    const underUs = dbRow.under_us_odds
    const usOdds  = activeDirection === 'under' ? underUs : overUs
    const otherUs = activeDirection === 'under' ? overUs  : underUs
    const oddsStr = usOdds != null ? fmtOdds(usOdds, null) : '—'
    const oddsCol = usOdds == null ? 'var(--muted)' : usOdds > 0 ? 'var(--green)' : 'var(--magenta)'
    const lineVal = dbRow.line ?? 0.5

    // Player cell metadata
    const pos    = dbRow.position  ?? ''
    const ageStr = dbRow.birth_date ? age(dbRow.birth_date) + ' y/o' : ''
    const meta   = [pos, ageStr].filter(Boolean).join(' · ')

    const safeName = (playerName || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
    const safeMkt  = (mktName    || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
    const normMkt  = normName(mktName).replace(/'/g,"\\'")
    const seasonId = dbRow.season_id ?? 0
    const matchId  = entry?.matchId  ?? 0

    // Past match result — find actual game in game_logs matching this match's date + teams
    const isPast = isMatchOld(entry?.match?.match_date)
    let gameResult = null
    if (isPast) {
      const gDate   = dbRow.game_date ?? ''
      const allGames = cache.normNameToGames?.[norm] ?? []
      const actual  = allGames.find(g =>
        g.match_date === gDate &&
        g.homeTeamUid === homeUid &&
        g.awayTeamUid === awayUid
      )
      if (actual) {
        const hits = Number(actual.stats?.hitting_hits ?? 0)
        const ab   = Number(actual.stats?.hitting_at_bats ?? 0)
        gameResult = { hits, ab }
      }
    }
    const rowspan  = 1 + sortedFKs.length

    // Closure — colors assigned after sort so A/B matches final position
    const buildTrows = (normalBg, expandedBg) => {
      const playerCellHtml = `<td class="align-top select-none" rowspan="${rowspan}"
           style="padding:7px 10px;color:var(--text);vertical-align:top"
           data-player-exp="${norm}_${matchId}"
           data-ab-bg="${expandedBg}"
           data-normal-bg="${normalBg}"
           onclick="var k='${norm}_${matchId}';if(expansions.has(k)){event.stopPropagation();collapseExpansion(k)}"
           onmouseover="groupHover('${norm}_${matchId}','#1e1e1e')"
           onmouseout="groupLeave('${norm}_${matchId}')">
        <div style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:700;line-height:1.2;margin-bottom:4px">
          <span data-us="${usOdds ?? ''}" data-other-us="${otherUs ?? ''}" style="color:${oddsCol}">${oddsStr}</span><span style="color:var(--muted);font-size:10px;margin-left:5px">${activeDirection === 'under' ? '&lt;' : '&gt;'}${lineVal}</span>
        </div>
        <div style="display:flex;align-items:center">
          ${punkImg(playerName)}
          <span style="display:inline-flex;flex-direction:column;line-height:1.3">
            <span style="font-size:11px;font-weight:600">${playerName}</span>
            ${meta ? `<span style="font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace">${meta}</span>` : ''}
          </span>
        </div>
      </td>`

      return ['DB', ...sortedFKs].map((f, idx) => {
        const cRow        = filterMap[f]
        const filterLabel = f === 'DB' ? 'ALL' : (FILTER_LABELS[f] ?? f)

        const vs     = activeVenue !== 'both' ? computeVenueStats(norm, f, cache, seasonId, entry) : null
        const effRow = vs ?? cRow

        const evRaw = activeVenue !== 'both'
          ? computeEV(effRow?.avg, effRow?.avg_ab_per_game, lineVal, activeDirection, dbRow.over_us_odds, dbRow.under_us_odds)
          : (activeDirection === 'under' ? cRow?.under_ev : cRow?.ev)
        const evPct = evRaw == null ? null : Math.round(evRaw * 1000) / 10
        const evStr = evPct == null ? '—' : (evPct > 0 ? `+${evPct.toFixed(1)}%` : `${evPct.toFixed(1)}%`)
        const evCol = evPct == null ? 'var(--muted)' : evPct > 0 ? 'var(--green)' : 'var(--magenta)'

        // For past matches, determine HIT/MISS from actual result
        let resultCell = `<td class="mono" style="padding:5px 10px;font-size:11px;font-weight:700;color:${evCol};white-space:nowrap;text-align:right;vertical-align:middle">${evStr}</td>`
        if (isPast && gameResult) {
          const won = activeDirection === 'under'
            ? gameResult.hits < lineVal
            : gameResult.hits > lineVal
          const label = won ? 'WON' : 'LOSS'
          const col   = won ? 'var(--green)' : 'var(--magenta)'
          resultCell  = `<td class="mono" style="padding:5px 10px;font-size:10px;font-weight:700;color:${col};white-space:nowrap;text-align:right;vertical-align:middle;letter-spacing:0.08em">${label} <span style="font-size:9px;opacity:0.6">${gameResult.hits}H</span></td>`
        } else if (isPast) {
          resultCell = `<td class="mono" style="padding:5px 10px;font-size:11px;color:var(--muted);text-align:right;vertical-align:middle">—</td>`
        }
        const avgRaw  = effRow?.avg
        const avgStr  = avgRaw != null
          ? avgRaw >= 1 ? '1.000' : `.${Math.round(avgRaw * 1000).toString().padStart(3,'0')}`
          : '—'
        const abStr = effRow?.avg_ab_per_game != null ? effRow.avg_ab_per_game.toFixed(1) : '—'

        const gc  = effRow?.games_count    ?? 0
        const gwh = effRow?.games_with_hit ?? 0
        const pct = gc > 0 ? Math.round(gwh / gc * 100) : 0
        const hStr = gc > 0 ? `${gwh}/${gc} <span style="color:var(--muted)">(${pct}%)</span>` : '—'

        const pcell     = idx === 0 ? playerCellHtml : ''
        const topBorder = idx === 0 ? 'border-top:1px solid #222;' : 'border-top:1px solid #1a1a1a;'

        return `<tr class="${shouldFilter ? 'filtered-row' : ''}"
          style="${shouldFilter ? 'display:none;' : ''}${topBorder}cursor:pointer;background:${normalBg}"
          onclick="handleRowClick(this,'${safeName}','${safeMkt}','${normMkt}',${lineVal},${matchId},${seasonId},'${f}')"
          onmouseover="groupHover('${norm}_${matchId}','#1e1e1e')" onmouseout="groupLeave('${norm}_${matchId}')">
          ${pcell}
          <td class="mono" style="padding:5px 10px;font-size:10px;font-weight:700;color:${filterLabel === 'ALL' ? 'var(--muted)' : 'var(--gold)'};text-transform:uppercase;letter-spacing:0.08em;text-align:center;vertical-align:middle">${filterLabel}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${avgStr}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${abStr}</td>
          <td class="mono" style="padding:5px 10px;font-size:11px;color:var(--text);text-align:center;vertical-align:middle">${hStr}</td>
          ${resultCell}
        </tr>`
      }).join('')
    }

    const dbEv = activeDirection === 'under' ? dbRow.under_ev : dbRow.ev

    if (shouldFilter) failing.push({ buildTrows, teamKey })
    else              passing.push({ buildTrows, teamKey, dbEv })
  }

  // Sort by DB ev descending (best positive EV first, nulls last)
  passing.sort((a, b) => {
    if (a.dbEv == null && b.dbEv == null) return 0
    if (a.dbEv == null) return 1
    if (b.dbEv == null) return -1
    return b.dbEv - a.dbEv
  })

  // Group by home/away team (preserving EV sort order within each group)
  const byTeam = new Map()
  for (const e of passing) {
    if (!byTeam.has(e.teamKey)) byTeam.set(e.teamKey, [])
    byTeam.get(e.teamKey).push(e)
  }

  // Build flat render order (team-grouped) THEN assign A/B colors by render position
  const abColors = (i) => {
    const even = i % 2 === 0
    const normalBg = even ? '#111111' : '#1a1a1a'
    return { normalBg, expandedBg: normalBg }
  }
  let renderIdx = 0
  for (const entries of byTeam.values()) {
    for (const e of entries) {
      const { normalBg, expandedBg } = abColors(renderIdx++)
      e.trows = e.buildTrows(normalBg, expandedBg)
    }
  }

  let tbodys = ''
  for (const [key, entries] of byTeam) {
    const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
    const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
    tbodys += `<tbody>`
    if (teamLabel) {
      tbodys += `<tr>
        <td colspan="6" class="team-hdr" style="position:sticky;z-index:10;background:#0a0a0a;padding:6px 10px 2px;font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.12em">${teamLabel}</td>
      </tr>`
    }
    tbodys += entries.map(e => e.trows).join('')
    tbodys += `</tbody>`
  }

  if (failing.length) {
    tbodys += `<tbody>`
    tbodys += `<tr class="filter-summary-row cursor-pointer select-none" style="border-top:1px solid #222" onclick="toggleFilteredRows(this)">
      <td colspan="6" style="padding:6px 10px">
        <span class="filter-chev" style="font-size:10px;color:var(--muted)">▷ </span>
        <span style="font-size:11px;color:var(--muted)">${failing.length} filtered</span>
      </td>
    </tr>`
    const failByTeam = new Map()
    for (const e of failing) {
      if (!failByTeam.has(e.teamKey)) failByTeam.set(e.teamKey, [])
      failByTeam.get(e.teamKey).push(e)
    }
    // Assign A/B for failing section separately, resetting counter
    let failIdx = 0
    for (const entries of failByTeam.values()) {
      for (const e of entries) {
        const { normalBg, expandedBg } = abColors(failIdx++)
        e.trows = e.buildTrows(normalBg, expandedBg)
      }
    }
    for (const [key, entries] of failByTeam) {
      const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
      const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
      if (teamLabel) {
        tbodys += `<tr class="filtered-row" style="display:none;border-top:1px solid #222">
          <td colspan="6" style="background:#0a0a0a;padding:6px 10px 2px;font-size:9px;color:var(--muted);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.12em">${teamLabel}</td>
        </tr>`
      }
      tbodys += entries.map(p => p.trows).join('')
    }
    tbodys += `</tbody>`
  }

  return tbodys
}

function groupHover(key, bg) {
  const ptd = document.querySelector(`[data-player-exp="${key}"]`)
  if (!ptd) return
  let r = ptd.closest('tr')
  const rs = ptd.rowSpan || 1
  for (let i = 0; i < rs; i++) { if (r) { r.style.background = bg; r = r.nextElementSibling } }
}
function groupLeave(key) {
  const ptd = document.querySelector(`[data-player-exp="${key}"]`)
  if (!ptd) return
  const normalBg = ptd.dataset.normalBg || ''
  const expandedBg = ptd.dataset.abBg || ''
  let r = ptd.closest('tr')
  const rs = ptd.rowSpan || 1
  for (let i = 0; i < rs; i++) {
    if (r) { r.style.background = r.classList.contains('row-expanded') ? expandedBg : normalBg; r = r.nextElementSibling }
  }
}

function toggleFilteredRows(el) {
  const row    = el.closest('tr')
  const tbody  = row.closest('tbody')
  const chevEl = row.querySelector('.filter-chev')
  const rows   = [...tbody.querySelectorAll('tr.filtered-row')]
  const hidden = rows[0]?.style.display === 'none'
  rows.forEach(r => { r.style.display = hidden ? '' : 'none' })
  if (chevEl) chevEl.textContent = hidden ? '▽ ' : '▷ '
}

let activeVenue     = 'both'          // 'both' | 'home' | 'away'

function updateVenueToggle() {
  const btn = document.getElementById('venue-toggle')
  if (!btn) return
  const s = `font-size:10px;font-weight:700;line-height:1;padding:0;height:24px;width:44px;text-align:center;border:2px solid;background:var(--surface);cursor:pointer;outline:none;text-transform:uppercase;font-family:'Geist Mono',monospace;user-select:none`
  btn.style.cssText = `${s};border-color:var(--gold);color:var(--gold)`
  btn.textContent = activeVenue === 'home' ? 'HOME' : activeVenue === 'away' ? 'AWAY' : 'H&A'
}

function cycleVenue() {
  activeVenue = activeVenue === 'both' ? 'home' : activeVenue === 'home' ? 'away' : 'both'
  updateVenueToggle()
  refreshMktTbodies([...activeFilters])
  for (const [key, exp] of expansions) {
    exp.barPage = null
    renderExpansionContent(key)
  }
}

const FILTER_ORDER  = ['L5','L10','L30','CS','LS','VS']
const FILTER_LABELS = { LS: "'25" }
function sortFilterKeys(keys) {
  return [...keys].sort((a, b) => FILTER_ORDER.indexOf(a) - FILTER_ORDER.indexOf(b))
}

function filterBtnHtml(f) {
  const active = activeFilters.has(f)
  return `<button onclick="selectFilter('${f}')" data-filter="${f}" ${active ? 'data-active="1"' : ''}
    class="${filterBtnClass()}" style="${filterBtnStyle(active)}"
    onmouseover="if(!this.dataset.active){this.style.borderColor='var(--gold)';this.style.color='var(--gold)'}"
    onmouseout="if(!this.dataset.active){this.style.borderColor='var(--border)';this.style.color='var(--muted)'}">
    ${FILTER_LABELS[f] ?? f}
  </button>`
}

function renderGlobalFilterBar() {
  document.getElementById('global-filter-bar').innerHTML =
    ['L5','L10','L30'].map(f => filterBtnHtml(f)).join('') +
    `<div style="width:1px;background:#222222;flex-shrink:0"></div>` +
    ['CS','LS','VS'].map(f => filterBtnHtml(f)).join('')
}

function updateGlobalFilterButtons() {
  document.querySelectorAll('#global-filter-bar [data-filter]').forEach(btn => {
    const f      = btn.dataset.filter
    const active = activeFilters.has(f)
    btn.className    = filterBtnClass()
    btn.style.cssText = filterBtnStyle(active)
    btn.textContent  = FILTER_LABELS[f] ?? f
    active ? btn.setAttribute('data-active','1') : btn.removeAttribute('data-active')
    btn.removeAttribute('data-pinned')
  })
}

function setGlobalFilterStatus(msg) {
  const el = document.querySelector('.filter-status-global')
  if (el) el.textContent = msg
}

function refreshMktTbodies(filterKeys) {
  filterKeys = sortFilterKeys(filterKeys)
  for (const entry of allMatches) {
    const card = document.querySelector(`[data-match-id="${entry.matchId}"]`)
    if (!card) continue
    const cache = filterCache[entry.matchId] ?? null
    card.querySelectorAll('table[data-mkt]').forEach(table => {
      const normMkt = table.dataset.mkt
      const mktName = Object.keys(entry.markets).find(k => normName(k) === normMkt)
      if (!mktName) return
      table.querySelectorAll('tbody').forEach(b => b.remove())
      table.insertAdjacentHTML('beforeend', renderMktTbodyContent(mktName, cache, filterKeys, entry))
    })
  }
  updateOddsInPlace()
  reinstateExpansion()
  requestAnimationFrame(updateMktTops)
}

function applyFilters() {
  updateGlobalFilterButtons()
  updateOUToggle()
  refreshMktTbodies([...activeFilters])
}

function selectFilter(f) {
  if (activeFilters.has(f)) activeFilters.delete(f)
  else                      activeFilters.add(f)
  applyFilters()
}

// ── Core ────────────────────────────────────────────────────────────────────

let activeTab     = 'All'
let activeMatch   = null
let allMatches    = []
let pastExpanded  = false
let sportExpanded = false

function togglePastExpanded() {
  pastExpanded = !pastExpanded
  if (pastExpanded) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 2); cutoff.setHours(0,0,0,0)
    const pastDates = [...new Set(
      allMatches
        .filter(e => isMatchOld(e.match?.match_date) && e.match?.match_date && new Date(e.match.match_date) >= cutoff)
        .map(e => `past:${dateLabel(e.match?.match_date)}`)
    )]
    pastDates.forEach(k => collapsedDates.add(k))
  }
  renderPills()
}
let collapsedDates = new Set()

function toggleDateGroup(lbl) {
  if (collapsedDates.has(lbl)) collapsedDates.delete(lbl)
  else collapsedDates.add(lbl)
  renderPills()
}

async function fetchAll(queryFn) {
  const PAGE = 1000
  let rows = [], from = 0
  while (true) {
    const { data } = await queryFn(from, from + PAGE - 1)
    if (!data?.length) break
    rows = rows.concat(data)
    if (data.length < PAGE) break
    from += PAGE
  }
  return rows
}

function matchYMD(dateStr) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(new Date(dateStr))
}
function isMatchOld(dateStr) {
  if (!dateStr) return false
  return matchYMD(dateStr) < matchYMD(new Date().toISOString())
}

function dateLabel(dateStr) {
  if (!dateStr) return '—'
  const d        = new Date(dateStr)
  const today    = new Date()
  const tomorrow = new Date(); tomorrow.setDate(today.getDate() + 1)
  const fmt      = dt => dt.toLocaleDateString('en-US', { timeZone: TZ, month: 'short', day: 'numeric' })
  const sameDay  = (a, b) => a.toLocaleDateString('en-US', { timeZone: TZ }) === b.toLocaleDateString('en-US', { timeZone: TZ })
  if (sameDay(d, today))    return 'TODAY'
  if (sameDay(d, tomorrow)) return 'TOMORROW'
  return fmt(d).toUpperCase()
}

// ── 1-phase load from player_prop_cache ──────────────────────────────────────

async function load(force = false) {
  showLoader()

  // Date window: today −3 … today +7 in Mexico City time
  const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(new Date())
  const fromDate = new Date(todayStr + 'T00:00:00Z'); fromDate.setUTCDate(fromDate.getUTCDate() - 3)
  const toDate   = new Date(todayStr + 'T00:00:00Z'); toDate.setUTCDate(toDate.getUTCDate() + 7)
  const fromStr  = fromDate.toISOString().slice(0, 10)
  const toStr    = toDate.toISOString().slice(0, 10)

  const cacheRows = await fetchAll((f, t) =>
    db.from('player_prop_cache')
      .select('*')
      .gte('game_date', fromStr)
      .lte('game_date', toStr)
      .order('match_id').order('player_name').order('filter')
      .range(f, t)
  )

  if (!cacheRows.length) {
    document.getElementById('sport-switcher').innerHTML = ''
    document.getElementById('match-pills').innerHTML = ''
    document.getElementById('content').innerHTML = '<p class="text-xs mt-12 text-center" style="color:var(--muted)">No cached props in window.</p>'
    hideLoader(); return
  }

  // Collect match IDs and team uids for metadata
  const matchIds = [...new Set(cacheRows.map(r => r.match_id))]
  const teamUids = [...new Set(cacheRows.flatMap(r => [r.home_team_uid, r.away_team_uid, r.player_team_uid]).filter(Boolean))]

  // Fetch sr_matches for match times/dates
  const matchRows = []
  for (let i = 0; i < matchIds.length; i += 200) {
    const { data } = await db.from('sr_matches')
      .select('id, match_date, home_team_uid, away_team_uid, season_id')
      .in('id', matchIds.slice(i, i + 200))
    if (data) matchRows.push(...data)
  }
  const matchMap = Object.fromEntries(matchRows.map(m => [m.id, m]))

  // Fetch sr_teams for display names / abbrs
  const teamRows = []
  for (let i = 0; i < teamUids.length; i += 200) {
    const { data } = await db.from('sr_teams').select('uid, name, abbr').in('uid', teamUids.slice(i, i + 200))
    if (data) teamRows.push(...data)
  }
  const teamMap = Object.fromEntries(teamRows.map(t => [t.uid, t]))
  window._teamCache = teamMap

  // Group cache rows by match
  const rowsByMatch = {}
  for (const r of cacheRows) {
    if (!rowsByMatch[r.match_id]) rowsByMatch[r.match_id] = []
    rowsByMatch[r.match_id].push(r)
  }

  // Build filterCache for every match from cached rows
  filterCache = {}
  for (const [midStr, rows] of Object.entries(rowsByMatch)) {
    const mid    = Number(midStr)
    const dbRows = rows.filter(r => r.filter === 'DB')

    // normNameToGames: game_logs from DB rows, compact → expanded format
    const normNameToGames = {}
    for (const r of dbRows) {
      const norm = normName(r.player_name)
      normNameToGames[norm] = (r.game_logs ?? []).map(g => ({
        match_date:  g.d,
        gameTeamUid: g.t,
        season_id:   g.s,
        homeTeamUid: g.h,
        awayTeamUid: g.a,
        stats: { hitting_hits: g.hi, hitting_at_bats: g.ab },
      }))
    }

    // teamsInfoByMid: keyed by date string (max 1 game per player per day)
    const teamsInfoByMid = {}
    for (const r of dbRows) {
      for (const g of r.game_logs ?? []) {
        teamsInfoByMid[g.d] = { homeTeamUid: g.h, awayTeamUid: g.a }
      }
    }

    // playerStats: normName → { filter → cacheRow }
    const playerStats    = {}
    const playerTeamUids = {}
    for (const r of rows) {
      const norm = normName(r.player_name)
      if (!playerStats[norm]) playerStats[norm] = {}
      playerStats[norm][r.filter] = r
      if (r.player_team_uid != null) playerTeamUids[norm] = r.player_team_uid
    }

    filterCache[mid] = { normNameToGames, teamsInfoByMid, playerStats, playerTeamUids }
  }

  // Build _playerNameCache for any legacy helpers
  window._playerNameCache    = {}
  window._playerTeamUidCache = {}
  for (const r of cacheRows) {
    if (r.sr_player_id) {
      window._playerNameCache[normName(r.player_name)] = r.sr_player_id
      window._playerTeamUidCache[r.sr_player_id]       = r.player_team_uid
    }
  }

  // Build allMatches — one entry per match_id
  allMatches = Object.entries(rowsByMatch).map(([midStr, rows]) => {
    const mid  = Number(midStr)
    const m    = matchMap[mid]
    const home = teamMap[m?.home_team_uid]
    const away = teamMap[m?.away_team_uid]
    const info = (m && SEASON_INFO[m.season_id]) ?? { sport: 'MLB', league: 'MLB' }
    // markets holds DB rows; renderer reads from filterCache (dbRows.length = player count)
    const markets = { [HITS_MKT]: rows.filter(r => r.filter === 'DB') }
    return {
      matchId: mid, match: m, home, away,
      abbr:   `${away?.abbr ?? '?'} @ ${home?.abbr ?? '?'}`,
      sport:  info.sport, league: info.league, markets,
    }
  }).sort((a, b) => new Date(a.match?.match_date) - new Date(b.match?.match_date))

  const sports = [...new Set(allMatches.map(e => e.sport))]
  if (!sports.includes(activeTab)) activeTab = sports[0] ?? 'MLB'
  renderSportSwitcher(sports)

  if (activeMatch !== null && !allMatches.find(e => e.matchId === activeMatch)) activeMatch = null

  renderPills()
  render()
  hideLoader()
  applyFilters()
}

function renderPills() {
  const tabMatches  = activeTab === 'All' ? allMatches : allMatches.filter(e => e.sport === activeTab)
  const visible     = tabMatches.filter(e => !isMatchOld(e.match?.match_date))
  const _cutoffBase = new Date(); _cutoffBase.setDate(_cutoffBase.getDate() - 2); _cutoffBase.setHours(0, 0, 0, 0)
  const past        = tabMatches.filter(e => isMatchOld(e.match?.match_date) && e.match?.match_date && new Date(e.match.match_date) >= _cutoffBase)
  const pillsEl     = document.getElementById('match-pills')
  const wrapper     = document.getElementById('match-pills-wrapper')

  // Auto-select closest upcoming match
  if (activeMatch === null && visible.length > 0) {
    const now      = Date.now()
    const upcoming = visible.filter(e => e.match?.match_date && new Date(e.match.match_date) > now)
    if (upcoming.length > 0) {
      activeMatch = upcoming.reduce((a, b) =>
        new Date(a.match.match_date) <= new Date(b.match.match_date) ? a : b
      ).matchId
    } else {
      activeMatch = visible.reduce((a, b) =>
        new Date(a.match?.match_date) >= new Date(b.match?.match_date) ? a : b
      ).matchId
    }
  }

  if (visible.length === 0 && past.length === 0) { pillsEl.innerHTML = ''; wrapper.className = ''; return }
  wrapper.className = ''

  const lblBtn = (lbl, key, marginLeft) =>
    `<button onclick="toggleDateGroup('${key}')" class="shrink-0${marginLeft ? ' ml-2' : ''}"
      style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);background:none;border:none;padding:0;cursor:pointer">
      ${collapsedDates.has(key) ? '▸' : '▾'} ${lbl}</button>`

  let lastLabel = null
  const parts = []
  for (const e of visible) {
    const lbl = dateLabel(e.match?.match_date)
    if (lbl !== lastLabel) {
      parts.push(lblBtn(lbl, lbl, lastLabel !== null))
      lastLabel = lbl
    }
    if (collapsedDates.has(lbl)) {
      if (e === visible.filter(x => dateLabel(x.match?.match_date) === lbl)[0]) {
        parts.push(`<div style="height:24px;width:1px;flex-shrink:0"></div>`)
      }
    } else {
      const active = activeMatch === e.matchId
      parts.push(`
        <button onclick="setMatch(${e.matchId})"
          class="match-pill whitespace-nowrap shrink-0 transition-colors
                 ${active ? 'match-pill-active' : 'match-pill-inactive'}"
          style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;font-variation-settings:'wght' 700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-width:2px;border-style:solid;cursor:pointer">
          ${e.abbr}
        </button>`)
    }
  }

  if (past.length > 0) {
    parts.push(`
      <button onclick="togglePastExpanded()"
        class="shrink-0"
        style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);background:none;border:none;padding:0;margin-left:8px;cursor:pointer">
        ${pastExpanded ? '▾' : '▸'} 48H AGO
      </button>`)
    if (pastExpanded) {
      let pastLabel = null
      for (const e of past) {
        const lbl = dateLabel(e.match?.match_date)
        const key = `past:${lbl}`
        if (lbl !== pastLabel) {
          parts.push(lblBtn(lbl, key, true))
          pastLabel = lbl
        }
        if (!collapsedDates.has(key)) {
          const active = activeMatch === e.matchId
          parts.push(`
            <button onclick="setMatch(${e.matchId})"
              class="match-pill whitespace-nowrap shrink-0 transition-colors opacity-60
                     ${active ? 'match-pill-active' : 'match-pill-inactive'}"
              style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-width:2px;border-style:solid;cursor:pointer">
              ${e.abbr}
            </button>`)
        }
      }
    }
  }

  pillsEl.innerHTML = parts.join('')
  requestAnimationFrame(updateStickyOffsets)
}

function setTab(tab) {
  activeTab = tab; activeMatch = null; sportExpanded = false
  const sports = [...new Set(allMatches.map(e => e.sport))]
  renderSportSwitcher(sports)
  renderPills(); render()
}

function renderSportSwitcher(sports) {
  const el = document.getElementById('sport-switcher')
  if (!el) return
  const labelStyle = `font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);background:none;border:none;padding:0;cursor:pointer`
  if (sports.length <= 1) {
    el.innerHTML = sports.length === 1
      ? `<span style="${labelStyle.replace('cursor:pointer','cursor:default')}">${sports[0]}</span>`
      : ''
    return
  }
  const others = sports.filter(s => s !== activeTab)
  let html = `<button onclick="sportExpanded=!sportExpanded;renderSportSwitcher([${sports.map(s=>`'${s}'`).join(',')}])" style="${labelStyle}">${sportExpanded ? '▾' : '▸'} ${activeTab}</button>`
  if (sportExpanded) {
    others.forEach(s => {
      html += `<button onclick="setTab('${s}')"
        class="match-pill match-pill-inactive whitespace-nowrap shrink-0"
        style="font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 8px;border-width:2px;border-style:solid;cursor:pointer">${s}</button>`
    })
  }
  el.innerHTML = html
}

function setMatch(matchId) {
  activeMatch = matchId
  renderPills(); render(); applyFilters()
}

function renderMatch(entry) {
  const { matchId, match, home, away, markets } = entry
  const homeFull = home?.name ?? '?'
  const awayFull = away?.name ?? '?'
  const homeNick = teamNick(homeFull)
  const awayNick = teamNick(awayFull)

  const cache      = filterCache[matchId] ?? null
  const filterKeys = sortFilterKeys([...activeFilters])

  const isPastMatch = isMatchOld(match?.match_date)
  const mktsEntries = Object.entries(markets)
  const mktCount    = mktsEntries.length
  const mktsHtml = mktsEntries.map(([mktName, rows], mi) => {
    const normMkt     = normName(mktName)
    const playerCount = cache ? Object.keys(cache.playerStats ?? {}).length : rows.length
    const tbodyHtml   = renderMktTbodyContent(mktName, cache, filterKeys, entry)
    const isLastMkt   = mi === mktCount - 1
    const thBase      = `position:sticky;z-index:15;background:var(--surface-2);padding:6px 10px;color:var(--muted);font-weight:700;font-family:'Geist Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;will-change:transform;box-shadow:0 -60px 0 0 var(--bg),0 2px 0 0 var(--surface-2)`

    return `
      <div class="mkt-title" id="mkt-title-${matchId}-${mi}"
        onclick="toggleMkt(${matchId},${mi})"
        style="position:sticky;z-index:${20 + mktCount - mi};display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;background:var(--surface-2);border:2px solid var(--border);overflow:hidden;box-shadow:0 -8px 0 0 var(--bg);transform:translateZ(0);${isLastMkt ? 'margin-top:2px;' : ''}"
        onmouseover="this.style.background='#1e1e22'" onmouseout="this.style.background='var(--surface-2)'">
        <span style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold)">${cleanMktName(mktName)}</span>
          <span style="font-size:10px;color:var(--muted)">${mktSubtitle(mktName, playerCount)}</span>
        </span>
        <span class="chev" style="color:var(--muted);font-size:9px">${mi === 0 ? '▼' : '▶'}</span>
      </div>
      <div class="mkt-body" id="mkt-body-${matchId}-${mi}" style="display:${mi === 0 ? 'block' : 'none'};border:2px solid var(--border);border-top:2px solid transparent;background:var(--surface);margin-bottom:10px">
        <table class="w-full" data-mkt="${normMkt}" style="font-size:11px;border-collapse:separate;border-spacing:0">
          <thead>
            <tr>
              <th style="${thBase};text-align:left;cursor:pointer;width:140px" onclick="showInfoModal('player')">Player</th>
              <th style="${thBase};text-align:center;cursor:pointer;width:14%" onclick="showInfoModal('filter')">FLTR</th>
              <th style="${thBase};text-align:center;cursor:pointer;width:14%" onclick="showInfoModal('avg')">Avg</th>
              <th style="${thBase};text-align:center;cursor:pointer;width:14%" onclick="showInfoModal('ab_avg')">AB Avg</th>
              <th style="${thBase};text-align:center;cursor:pointer;width:14%" onclick="showInfoModal('hit_rate')">Hit Rate</th>
              <th style="${thBase};text-align:right;cursor:pointer" onclick="showInfoModal('${isPastMatch ? 'result' : 'ev'}')">${isPastMatch ? 'Result' : 'EV'}</th>
            </tr>
          </thead>
          ${tbodyHtml}
        </table>
      </div>`
  }).join('')

  const matchLbl = `${awayNick} @ ${homeNick}`
  const dateLbl  = match?.match_date
    ? new Date(match.match_date).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: TZ })
    : '—'

  return `
    <div data-match-id="${matchId}">
      <div data-match-title style="position:fixed;left:0;right:0;z-index:35;background:var(--bg);padding-bottom:6px">
        <div class="max-w-[960px] mx-auto px-4 pt-2 flex items-baseline gap-2">
          <span style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;font-variation-settings:'wght' 700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text)">${matchLbl}</span>
          <span style="font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted)">${dateLbl}</span>
        </div>
      </div>
      ${mktsHtml}
    </div>`
}

function updateStickyOffsets() {
  const header        = document.querySelector('header')
  const pillsWrapper  = document.getElementById('match-pills-wrapper')
  const filterSection = document.getElementById('filter-section')
  let offset = 0
  if (header)        { offset += header.offsetHeight - 1 }
  if (pillsWrapper)  { pillsWrapper.style.top  = offset + 'px'; offset += pillsWrapper.offsetHeight - 1 }
  if (filterSection) { filterSection.style.top = offset + 'px'; offset += filterSection.offsetHeight - 1 }
  const matchTitle = document.querySelector('[data-match-title]')
  if (matchTitle) {
    matchTitle.style.top = offset + 'px'
    offset = matchTitle.getBoundingClientRect().bottom
  }
  document.documentElement.style.setProperty('--nav-h', offset + 'px')
  const content = document.getElementById('content')
  if (content) content.style.paddingTop = (offset + 16) + 'px'
  updateMktTops()
}
window.addEventListener('resize', updateStickyOffsets)

function toggleMkt(matchId, mi) {
  for (const [key, exp] of [...expansions]) {
    if (exp.matchId === matchId) collapseExpansion(key)
  }
  const titleEl      = document.getElementById('mkt-title-' + matchId + '-' + mi)
  const body         = document.getElementById('mkt-body-'  + matchId + '-' + mi)
  const scrollBefore = window.scrollY
  const offsetBefore = titleEl.offsetTop
  const isOpen = body.style.display !== 'none'
  const card = document.querySelector('[data-match-id="' + matchId + '"]')
  card.querySelectorAll('.mkt-body').forEach(b  => { b.style.display = 'none' })
  card.querySelectorAll('.mkt-title .chev').forEach(c => { c.textContent = '▶' })
  if (!isOpen) {
    body.style.display = 'block'
    titleEl.querySelector('.chev').textContent = '▼'
  }
  const offsetAfter = titleEl.offsetTop
  window.scrollTo(0, scrollBefore + (offsetAfter - offsetBefore))
  requestAnimationFrame(updateMktTops)
}

function updateMktTops() {
  if (activeMatch == null) return
  const card = document.querySelector('[data-match-id="' + activeMatch + '"]')
  if (!card) return
  const titles = card.querySelectorAll('.mkt-title')
  if (!titles.length) return
  const navH   = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 0
  const titleH = titles[0].offsetHeight
  titles.forEach((t, i) => {
    t.style.top    = (navH + i * titleH) + 'px'
    t.style.zIndex = 20 + (titles.length - i)
    const bodyEl = document.getElementById(t.id.replace('mkt-title', 'mkt-body'))
    if (!bodyEl) return
    const theadTop = navH + i * titleH + titleH - 2
    bodyEl.querySelectorAll('th').forEach(th => { th.style.top = theadTop + 'px' })
    const thead  = bodyEl.querySelector('thead')
    const theadH = thead ? thead.offsetHeight : 0
    bodyEl.querySelectorAll('.team-hdr').forEach(td => { td.style.top = (theadTop + theadH) + 'px' })
  })
}

window.addEventListener('scroll', () => {
  const matchTitle = document.querySelector('[data-match-title]')
  if (matchTitle) {
    const bottom = matchTitle.getBoundingClientRect().bottom
    document.documentElement.style.setProperty('--nav-h', bottom + 'px')
  }
}, { passive: true })

function render() {
  renderGlobalFilterBar()
  updateOUToggle()
  updateVenueToggle()
  let entries = (activeTab === 'All' ? allMatches : allMatches.filter(e => e.sport === activeTab))
    .filter(e => !isMatchOld(e.match?.match_date) || e.matchId === activeMatch)
  if (activeMatch !== null) entries = entries.filter(e => e.matchId === activeMatch)
  if (!entries.length) {
    document.getElementById('content').innerHTML = '<p class="mono text-center" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:48px">NO PROPS</p>'
    return
  }
  document.getElementById('content').innerHTML = entries.map(renderMatch).join('')
  requestAnimationFrame(updateStickyOffsets)
}

renderGlobalFilterBar()
updateOUToggle()
updateVenueToggle()
updateStickyOffsets()
load()

// ── Player Row Expansion ─────────────────────────────────────────────────────

// Map: playerKey → { playerName, mktName, normMkt, propLine, matchId, seasonId,
//                    lockedFilter, lockedDirection, tr, expandedRows }
const expansions = new Map()

// Click on any filter row (ALL / L3 / L6 / …)
function handleRowClick(tr, playerName, mktName, normMkt, propLine, matchId, seasonId, filterKey) {
  const key = normName(playerName) + '_' + matchId

  if (expansions.has(key)) {
    const exp = expansions.get(key)
    if (exp.lockedFilter === filterKey) {
      // Same row clicked again → collapse
      collapseExpansion(key)
    } else {
      // Different row → update bar chart in place
      exp.lockedFilter = filterKey
      exp.barPage = null
      renderExpansionContent(key)
    }
    return
  }

  // New expansion — find player td (has data-player-exp) to anchor the row
  const playerTd = document.querySelector(`[data-player-exp="${key}"]`)
  if (!playerTd) return

  const normalBg = playerTd.dataset.normalBg || ''
  expansions.set(key, {
    playerName, mktName, normMkt, propLine, matchId, seasonId,
    lockedFilter: filterKey, lockedDirection: activeDirection || 'over',
    barPage: null,
    normalBg, tr: null, expandedRows: null,
  })
  insertExpansionRow(playerTd, key)
  fetchExpansionData(key)
}

// Synchronous — reads game_logs straight from filterCache
function fetchExpansionData(key) {
  const exp = expansions.get(key)
  if (!exp) return
  const cache = filterCache[exp.matchId]
  const norm  = normName(exp.playerName)
  exp.games         = cache?.normNameToGames?.[norm] ?? []
  exp.playerTeamUid = cache?.playerTeamUids?.[norm]  ?? null
  renderExpansionContent(key)
}

function insertExpansionRow(td, key) {
  const expandedBg = td.dataset.abBg || '#2a2a2a'
  let lastRow = td.closest('tr')
  const rs    = td.rowSpan || 1
  const expandedRows = [lastRow]
  for (let i = 1; i < rs; i++) {
    lastRow = lastRow.nextElementSibling
    if (lastRow) expandedRows.push(lastRow)
  }
  expandedRows.forEach(r => { r.classList.add('row-expanded'); r.style.background = expandedBg })
  lastRow.insertAdjacentHTML('afterend', `
    <tr data-expansion-key="${key}" style="border-top:none">
      <td colspan="10" style="background:${expandedBg};user-select:none;padding:0" data-expansion-cell="${key}"><div class="px-2.5 py-2.5" style="overflow:hidden;width:100%;box-sizing:border-box"></div></td>
    </tr>`)
  const exp = expansions.get(key)
  if (exp) { exp.tr = lastRow.nextElementSibling; exp.expandedRows = expandedRows }
}

function setBarPage(key, page) {
  const exp = expansions.get(key)
  if (!exp) return
  exp.barPage = page
  renderExpansionContent(key)
}

function collapseExpansion(key) {
  const exp = expansions.get(key)
  if (exp?.tr) exp.tr.remove()
  if (exp?.expandedRows) exp.expandedRows.forEach(r => { r.classList.remove('row-expanded'); r.style.background = exp.normalBg || '' })
  expansions.delete(key)
}

function getExpCell(key) {
  const td = expansions.get(key)?.tr?.querySelector(`[data-expansion-cell="${key}"]`)
  return td?.querySelector('div') ?? td
}

function reinstateExpansion() {
  const toCollapse = []
  for (const [key, exp] of expansions) {
    exp.tr = null
    const { normMkt, matchId } = exp
    const td = document.querySelector(
      `[data-match-id="${matchId}"] table[data-mkt="${normMkt}"] [data-player-exp="${key}"]`)
    if (!td) { toCollapse.push(key); continue }
    const nowFiltered = td.closest('tr')?.classList.contains('filtered-row') ?? false
    if (nowFiltered) { toCollapse.push(key); continue }
    insertExpansionRow(td, key)
    if (exp.games !== undefined) renderExpansionContent(key)
    else fetchExpansionData(key)
  }
  toCollapse.forEach(key => collapseExpansion(key))
}

function renderExpansionContent(key) {
  const exp  = expansions.get(key)
  const cell = getExpCell(key)
  if (!exp || !cell) return

  const { mktName, propLine, seasonId, lockedDirection, lockedFilter, games, playerTeamUid } = exp

  if (games === undefined) {
    cell.innerHTML = '<p class="text-xs" style="color:var(--muted)">Loading…</p>'
    return
  }

  const filterKey = lockedFilter ?? 'DB'
  const isCS      = filterKey === 'CS'
  const isLS      = filterKey === 'LS'
  const isVS      = filterKey === 'VS'
  const isDB      = filterKey === 'DB'
  const N         = (isCS || isLS || isVS || isDB) ? Infinity : parseInt(filterKey.slice(1))

  // Derive last season ID dynamically from player's games
  const allSeasonIds  = [...new Set(games.map(g => g.season_id).filter(Boolean))].sort((a, b) => a - b)
  const curSeasonIdx  = allSeasonIds.indexOf(seasonId)
  const lastSeasonId  = curSeasonIdx > 0 ? allSeasonIds[curSeasonIdx - 1] : null

  const statKey   = mktToStatKey(mktName)
  const isHitsMkt = statKey === 'hitting_hits'

  // Exclude 0-AB games for hits markets
  const gamesFiltered = isHitsMkt
    ? games.filter(g => (g.stats?.hitting_at_bats ?? 0) > 0)
    : games

  // VS: restrict to games vs upcoming opponent
  let vsGames = gamesFiltered
  if (isVS) {
    const matchEntry = allMatches.find(e => e.matchId === exp.matchId)
    const mHomeUid   = matchEntry?.match?.home_team_uid
    const mAwayUid   = matchEntry?.match?.away_team_uid
    const upcomingOpp = playerTeamUid === mHomeUid ? mAwayUid
                      : playerTeamUid === mAwayUid ? mHomeUid
                      : mHomeUid ?? null
    if (upcomingOpp != null) {
      vsGames = gamesFiltered.filter(g => {
        const gameTeamUid = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
        const oppUid = gameTeamUid === g.homeTeamUid ? g.awayTeamUid
                     : gameTeamUid === g.awayTeamUid ? g.homeTeamUid : null
        return oppUid === upcomingOpp
      })
    }
  }

  // Apply venue filter
  const venueGames = activeVenue === 'both' ? vsGames : vsGames.filter(g => {
    const gTeam  = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
    const isHome = gTeam != null ? g.homeTeamUid === gTeam : null
    if (isHome === null) return true
    return activeVenue === 'home' ? isHome : !isHome
  })

  const barsData = (isCS ? venueGames.filter(g => g.season_id === seasonId)
                  : isLS ? venueGames.filter(g => g.season_id === lastSeasonId)
                  : isVS || isDB ? venueGames
                  : venueGames.slice(0, N)).reverse()

  const CHART_H  = 120
  const allVals  = barsData.map(g => statKey ? Number(g.stats?.[statKey] ?? 0) : 0)
  const maxAB    = isHitsMkt ? Math.max(...barsData.map(g => Number(g.stats?.hitting_at_bats ?? 0)), 1) : 0
  // Scale computed against full dataset so bar height is consistent across pages
  const maxVal   = Math.max(...allVals, propLine ?? 0, maxAB, 0)
  const maxChart = maxVal > 0 ? maxVal * 1.35 : 1
  const linePct  = (propLine != null && maxChart > 0) ? (propLine / maxChart * 100) : null

  const PAGE_SIZE  = 10
  const totalBars  = barsData.length
  const totalPages = Math.ceil(totalBars / PAGE_SIZE)
  const page       = Math.min(exp.barPage ?? 0, Math.max(0, totalPages - 1))
  // Paginate from end so page 0 = most recent 10, last page = oldest remainder
  const pageEnd    = totalBars - page * PAGE_SIZE
  const pageStart  = Math.max(0, pageEnd - PAGE_SIZE)
  const pageBars   = totalPages > 1 ? barsData.slice(pageStart, pageEnd) : barsData

  const barsHtml = pageBars.length === 0
    ? '<p class="text-[10px] py-4" style="color:var(--muted)">No games in this window</p>'
    : pageBars.map(g => {
        const rawVal   = statKey ? (g.stats?.[statKey] ?? null) : null
        const value    = rawVal != null ? Number(rawVal) : 0
        const barGameTeamUid = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
        const isHome   = barGameTeamUid != null ? g.homeTeamUid === barGameTeamUid : null
        const oppUid   = isHome !== null ? (isHome ? g.awayTeamUid : g.homeTeamUid) : null
        const opp      = oppUid ? window._teamCache?.[oppUid] : null
        const passes   = propLine != null ? (lockedDirection === 'under' ? value < propLine : value > propLine) : null
        const dateStr  = g.match_date ? new Date(g.match_date).toLocaleDateString('en-US', { timeZone: 'UTC', month: 'numeric', day: 'numeric', year: '2-digit' }) : '—'
        const heightPx = maxChart > 0 ? Math.round((value / maxChart) * CHART_H) : 0
        const barH     = value > 0 ? Math.max(heightPx, 3) : 0
        const color    = passes === null ? 'var(--muted)' : passes ? 'var(--green)' : 'var(--magenta)'
        const dispVal  = value % 1 === 0 ? String(value) : value.toFixed(1)
        const homeAway = isHome === null ? '' : isHome ? 'Home' : 'Away'
        const haColor  = isHome === null ? 'var(--muted)' : isHome ? '#89b4fa' : '#fab387'
        const valColor = passes === true ? 'var(--green)' : passes === false ? 'var(--magenta)' : 'var(--muted)'
        const ab       = isHitsMkt && g.stats ? Number(g.stats.hitting_at_bats ?? 0) : null
        const abBarH   = ab != null && maxChart > 0 ? Math.round((ab / maxChart) * CHART_H) : 0

        let barInner
        if (value === 0) {
          barInner = `<span class="absolute text-[10px] font-bold leading-none text-center w-full" style="bottom:6px;color:var(--muted)">0</span>
                      <div class="absolute bottom-0 left-0.5 right-0.5" style="height:3px;background:var(--surface-2);border-radius:1px"></div>`
        } else if (heightPx < 18) {
          barInner = `<span class="absolute text-[10px] font-bold leading-none text-center w-full" style="bottom:${barH + 3}px;color:${valColor}">${dispVal}</span>
                      <div class="absolute bottom-0 left-0.5 right-0.5" style="height:${barH}px;background:${color};border-radius:1px 1px 0 0"></div>`
        } else {
          barInner = `<div class="absolute bottom-0 left-0.5 right-0.5 flex items-center justify-center" style="height:${barH}px;background:${color};border-radius:1px 1px 0 0">
                        <span class="text-[10px] font-bold leading-none" style="color:var(--bg)">${dispVal}</span>
                      </div>`
        }

        return `<div class="flex flex-col items-center gap-0.5" style="min-width:0">
          <span class="text-[10px] font-mono leading-none truncate w-full text-center" style="color:var(--text)">${opp?.abbr ?? '?'}</span>
          <span class="text-[9px] leading-none" style="color:${haColor}">${homeAway}</span>
          <span class="text-[9px] leading-none opacity-0">·</span>
          <div class="relative w-full mt-1" style="height:${CHART_H}px">
            ${ab != null && ab > 0 ? `<div class="absolute bottom-0 left-0 right-0 flex items-start justify-center pt-0.5" style="height:${Math.min(abBarH, CHART_H)}px;background:rgba(99,179,237,0.15);border-radius:1px 1px 0 0"><span class="text-[9px] font-mono leading-none" style="color:#63b3ed">${ab}</span></div>` : ''}
            ${barInner}
            ${linePct != null ? `<div class="absolute pointer-events-none" style="left:-3px;right:-3px;bottom:${linePct.toFixed(1)}%;z-index:10;border-top:1px solid rgba(255,255,255,0.7)"></div>` : ''}
          </div>
          <span class="text-[9px] mt-0.5 leading-none" style="color:var(--muted)">${dateStr}</span>
        </div>`
      }).join('')

  const filterLabel = filterKey === 'DB' ? 'ALL' : (FILTER_LABELS[filterKey] ?? filterKey)
  const labelColor  = filterKey === 'DB' ? 'var(--muted)' : 'var(--gold)'
  const rangeFrom   = page * PAGE_SIZE + 1
  const rangeTo     = page * PAGE_SIZE + pageBars.length
  const rangeStr    = totalPages > 1 ? `${rangeFrom}–${rangeTo} of ${totalBars}` : `${totalBars} games`
  const labelHtml   = `<span style="color:${labelColor}">${filterLabel}</span> · <span style="color:var(--muted)">${rangeStr}</span>`

  const arrowBtn    = (dir, targetPage, invisible) =>
    `<button onclick="setBarPage('${key}',${targetPage})" style="background:none;border:none;cursor:${invisible ? 'default' : 'pointer'};color:var(--gold);font-size:36px;padding:0 2px;line-height:1;display:flex;align-items:center;align-self:stretch;transition:opacity 0.15s;opacity:0.8;flex-shrink:0;visibility:${invisible ? 'hidden' : 'visible'};pointer-events:${invisible ? 'none' : 'auto'}" onmouseover="if(this.style.visibility!=='hidden')this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">${dir}</button>`
  const prevBtn     = totalPages > 1 ? arrowBtn('‹', page + 1, page >= totalPages - 1) : arrowBtn('‹', 0, true)
  const nextBtn     = totalPages > 1 ? arrowBtn('›', page - 1, page === 0)             : arrowBtn('›', 0, true)

  cell.innerHTML = !statKey
    ? '<p class="text-[11px] py-2" style="color:var(--muted)">No stat mapping for this market</p>'
    : `<div style="margin-bottom:6px;font-size:9px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:0.1em">${labelHtml}</div>
       <div style="display:flex;align-items:stretch;gap:0;width:100%;overflow:hidden">${prevBtn}<div style="flex:1;display:grid;grid-template-columns:repeat(${PAGE_SIZE},1fr);gap:6px;overflow:hidden;min-width:0">${'<div></div>'.repeat(PAGE_SIZE - pageBars.length)}${barsHtml}</div>${nextBtn}</div>`
}
</script>
