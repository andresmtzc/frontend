<div class="border-b border-gray-800">

<script>
const SUPABASE_URL  = 'https://wxvjetgeiuzjuyzfhutv.supabase.co'
const SUPABASE_ANON = 'sb_publishable_mXQB6BSxNpWyL0D3HG0gwA_fwdWoqVh'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON)

const SEASON_INFO = {
  137954: { sport: 'Soccer', league: 'Liga MX' },
  130979: { sport: 'Soccer', league: 'Liga MX' },
  127243: { sport: 'Soccer', league: 'Liga MX' },
  119017: { sport: 'Soccer', league: 'Liga MX' },
  134469: { sport: 'MLB',    league: 'MLB'     },
  125735: { sport: 'MLB',    league: 'MLB'     },
  131631: { sport: 'NBA',    league: 'NBA'     },
  119257: { sport: 'NBA',    league: 'NBA'     },
  127985: { sport: 'NFL',    league: 'NFL'     },
  115087: { sport: 'NFL',    league: 'NFL'     },
  130805: { sport: 'Soccer', league: 'La Liga' },
  131129: { sport: 'Soccer', league: 'Champions League' },
  130281: { sport: 'Soccer', league: 'Premier League'   },
}

const MODES = [
  { id: 'US',  label: 'US',   col: 'US'     },
  { id: 'Dec', label: 'Dec',  col: 'Dec'    },
  { id: 'Pct', label: '%',    col: 'Impl.'  },
  { id: '$',   label: '$',    col: 'Profit' },
]
let modeIdx = 0

function cycleMode() {
  modeIdx = (modeIdx + 1) % MODES.length
  document.getElementById('mode-btn').textContent = MODES[modeIdx].label
  updateOddsInPlace()
}

function updateOddsInPlace() {
  document.querySelectorAll('[data-us]').forEach(td => {
    const us      = td.dataset.us      === '' ? null : Number(td.dataset.us)
    const otherUs = td.dataset.otherUs === '' ? null : (td.dataset.otherUs != null ? Number(td.dataset.otherUs) : null)
    td.innerHTML  = fmtOdds(us, otherUs)
    td.className  = td.className.replace(/text-(white|gray|green|red)-\w+/, oddsClass(us))
  })
  document.querySelectorAll('[data-col-label]').forEach(th => {
    th.textContent = MODES[modeIdx].col
  })
}

function betAmt() {
  return Math.max(1, Number(document.getElementById('bet-amt').value) || 100)
}

function fmtOdds(us, otherUs) {
  if (us == null) return '—'
  const mode = MODES[modeIdx].id
  if (mode === 'US')  return us > 0 ? `+${us}` : String(us)
  if (mode === 'Dec') { const dec = us > 0 ? us/100+1 : 100/Math.abs(us)+1; return `${dec.toFixed(2)}×` }
  if (mode === 'Pct') {
    const imp = us > 0 ? 100/(us+100)*100 : Math.abs(us)/(Math.abs(us)+100)*100
    if (otherUs != null) {
      const otherImp = otherUs > 0 ? 100/(otherUs+100)*100 : Math.abs(otherUs)/(Math.abs(otherUs)+100)*100
      const trueProb = imp / (imp + otherImp) * 100
      return `${imp.toFixed(1)}% <span class="text-gray-500 text-[10px]">(${trueProb.toFixed(1)}%)</span>`
    }
    return `${imp.toFixed(1)}%`
  }
  if (mode === '$')   { const p = us > 0 ? betAmt()*us/100 : betAmt()*100/Math.abs(us); return `$${p.toFixed(0)}` }
}

function oddsClass(us) {
  return us == null ? 'text-gray-400' : 'text-white'
}

// ── Filter helpers ──────────────────────────────────────────────────────────

function abbrName(name) {
  const parts    = name.trim().split(/\s+/)
  if (parts.length <= 1) return name
  const suffixes = new Set(['jr.','sr.','jr','sr','ii','iii','iv'])
  let end = parts.length
  while (end > 1 && suffixes.has(parts[end-1].toLowerCase())) end--
  const suffix = end < parts.length ? ' ' + parts.slice(end).join(' ') : ''
  return `${parts[0][0]}. ${parts.slice(1, end).join(' ')}${suffix}`
}

function normName(n) {
  return (n || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/-/g, ' ')          // "Jung-Hoo" → "Jung Hoo" (separate tokens)
    .replace(/[^a-z\s]/g, '')    // strip commas, apostrophes, etc.
    .trim().split(/\s+/).sort().join(' ')
}

// Two tokens match if equal OR one is a prefix of the other (min 3 chars each)
function tokenMatch(a, b) {
  if (a === b) return true
  const m = Math.min(a.length, b.length)
  return m >= 3 && (a.startsWith(b) || b.startsWith(a))
}

// Look up player_id from cache, falling back to fuzzy match:
// allow nickname/prefix differences as long as >50% of both names' tokens match.
function findPlayerId(name, cache) {
  const norm = normName(name)
  if (cache[norm] != null) return cache[norm]

  const tokA = norm.split(' ')
  let bestId = null, bestScore = -1

  for (const [cn, id] of Object.entries(cache)) {
    const tokB = cn.split(' ')
    const usedB = new Set()
    let hits = 0
    for (const a of tokA) {
      for (let i = 0; i < tokB.length; i++) {
        if (!usedB.has(i) && tokenMatch(a, tokB[i])) { hits++; usedB.add(i); break }
      }
    }
    if (!hits) continue
    const recA = hits / tokA.length
    const recB = hits / tokB.length
    if (recA > 0.5 && recB > 0.5) {
      const score = recA + recB
      if (score > bestScore) { bestScore = score; bestId = id }
    }
  }
  return bestId
}

function mktToStatKey(mktName) {
  const m = mktName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  if (m.includes('pitcher') && m.includes('strikeout')) return 'pitching_overall_total_strikeouts'
  if (m.includes('strikeout'))  return 'hitting_total_strikeouts'
  if (m.includes('hit'))        return 'hitting_hits'
  if (m.includes('base'))       return 'hitting_total_bases'
  if (m.includes('run'))        return 'hitting_total_runs_scored'
  return null
}

function impliedProb(us) {
  if (us == null) return null
  return us < 0 ? Math.abs(us) / (Math.abs(us) + 100) : 100 / (us + 100)
}

function binomialProb(ba, avgAB, line) {
  if (ba == null || avgAB == null || avgAB <= 0) return null
  const n = Math.round(avgAB)
  const k = Math.floor(line) // 0 for 0.5 line, 1 for 1.5, etc
  let pUnder = 0
  for (let i = 0; i <= k; i++) {
    let comb = 1
    for (let j = 0; j < i; j++) comb = comb * (n - j) / (j + 1)
    pUnder += comb * Math.pow(ba, i) * Math.pow(1 - ba, n - i)
  }
  return Math.max(0, Math.min(1, 1 - pUnder))
}

function trueImplied(overUs, underUs) {
  if (overUs == null || underUs == null) return null
  const io = impliedProb(overUs), iu = impliedProb(underUs)
  return io / (io + iu)
}

function parseLine(selnName) {
  const m = (selnName || '').match(/(\d+\.?\d*)\s*$/)
  return m ? parseFloat(m[1]) : null
}

function isOver(selnName) {
  const low = (selnName || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  return low.includes('mas') || low.includes('over')
}

function buildPlayerMap(rows) {
  const players = {}
  for (const r of rows) {
    const k = r.seln_hcap || r.seln_name || '—'
    if (!players[k]) players[k] = []
    players[k].push(r)
  }
  return players
}

function cleanMktName(name) {
  return name
    .replace(/\s+DEL\s+BATEADOR/gi, '')
    .replace(/\s*\(INCL\.?\s*EXTRA\s*INNINGS\)/gi, '')
    .replace(/\s+M[AÁ]S\s+DE\s*[\/]\s*MENOS\s+DE/gi, ' OVER/UNDER')
    .replace(/\s+M[AÁ]S\s+DE\s+MENOS\s+DE/gi, ' OVER/UNDER')
    .replace(/\s+M[AÁ]S\s+DE/gi, ' OVER')
    .replace(/\s+MENOS\s+DE/gi, ' UNDER')
    .trim()
}

// ── Render market tbody (passing players first, filtered grouped at bottom) ──

function renderMktTbodyContent(mktName, playerMap, cache, filterKeys, entry) {
  const statKey   = mktToStatKey(mktName)
  const hasFilter = filterKeys.length > 0
  const passing   = [], failing = []

  for (const [playerName, prows] of Object.entries(playerMap)) {
    const normPlayer = normName(playerName)
    const overRow    = prows.find(r =>  isOver(r.seln_name))
    const underRow   = prows.find(r => !isOver(r.seln_name))
    const dirRow     = activeDirection === 'under' ? underRow
                     : activeDirection === 'over'  ? overRow
                     : overRow   // fallback for implied prob when no direction set

    // Resolve player id + team uid early (needed for VS filter and team grouping)
    const homeUid = entry?.match?.home_team_uid
    const awayUid = entry?.match?.away_team_uid
    const playerId = window._playerNameCache ? findPlayerId(playerName, window._playerNameCache) : null
    const playerTeamUid = playerId != null ? window._playerTeamUidCache?.[playerId] : null

    // VS filter key setup (computed once per player, used inside the fk loop)
    const hasVSFilter = hasFilter && filterKeys.includes('VS')
    const upcomingOpponentUid = hasVSFilter && playerTeamUid != null
      ? (playerTeamUid === homeUid ? awayUid : playerTeamUid === awayUid ? homeUid : null)
      : null
    const vsUnknown = hasVSFilter && playerTeamUid == null

    // Compute stats per active filter key
    const filterStats = hasFilter ? filterKeys.map(fk => {
      const isCS  = fk === 'CS'
      const isVS  = fk === 'VS'
      const N     = isCS || isVS ? Infinity : parseInt(fk.slice(1))
      let hits = 0, total = 0, hitRate = null, ba = null, avgAB = null
      if (overRow && statKey && cache?.normNameToGames?.[normPlayer]) {
        const lineVal = parseLine(overRow.seln_name)
        const games   = cache.normNameToGames[normPlayer]
        const vsGames = isVS && upcomingOpponentUid != null
          ? games.filter(g => {
              const ti = cache?.teamsInfoByMid?.[g.match_id]
              if (!ti) return false
              const gameTeamUid = g.team_uid != null ? Number(g.team_uid) : playerTeamUid
              const opp = gameTeamUid === ti.homeTeamUid ? ti.awayTeamUid
                        : gameTeamUid === ti.awayTeamUid ? ti.homeTeamUid : null
              return opp === upcomingOpponentUid
            })
          : games
        let slice     = isCS ? vsGames.filter(g => g.inSeason) : isVS ? vsGames : vsGames.slice(0, N)
        if (statKey === 'hitting_hits') slice = slice.filter(g => (g.stats?.hitting_at_bats ?? 0) > 0)
        total = slice.length
        if (total > 0 && lineVal != null) {
          const ov = slice.filter(g => (g.stats?.[statKey] ?? 0) > lineVal).length
          hits    = activeDirection === 'under' ? (total - ov) : ov
          hitRate = hits / total
        }
        if (statKey === 'hitting_hits' && total > 0) {
          const tH  = slice.reduce((s, g) => s + Number(g.stats?.hitting_hits    ?? 0), 0)
          const tAB = slice.reduce((s, g) => s + Number(g.stats?.hitting_at_bats ?? 0), 0)
          if (tAB > 0) { ba = tH / tAB; avgAB = tAB / slice.length }
        }
      }
      return { fk, hits, total, hitRate, ba, avgAB }
    }) : []

    const validStats = filterStats.filter(s => s.hitRate !== null)

    // Career BA — from full DB history via _careerBACache
    let careerBA = null, careerAvgAB = null
    if (statKey === 'hitting_hits' && window._careerBACache) {
      if (playerId != null) {
        const entry = window._careerBACache[playerId]
        careerBA    = entry?.ba    ?? null
        careerAvgAB = entry?.avgAB ?? null
      }
    }

    const imp    = dirRow ? impliedProb(dirRow.us_prc) : null
    // noData: not in cache at all, OR (no VS filter) in cache but zero games in every window
    const noData = hasFilter && statKey && cache != null && (
      !cache.normNameToGames?.[normPlayer] || (!hasVSFilter && validStats.length === 0)
    )
    // Heavy line filter — only applies when a stat filter is also active
    const isHeavy = hasFilter && filterHeavyLines && dirRow?.us_prc != null && dirRow.us_prc < -200
    const shouldFilter = hasFilter && (isHeavy || noData)

    // Binomial edge per filter window (hits markets only)
    const propLine    = overRow ? parseLine(overRow.seln_name) : null
    const trueOvProb  = (overRow && underRow) ? trueImplied(overRow.us_prc, underRow.us_prc) : null
    const binomEdges  = statKey === 'hitting_hits' && trueOvProb != null && propLine != null
      ? filterStats.map(s => {
          if (s.ba == null || s.avgAB == null) return null
          const p    = binomialProb(s.ba, s.avgAB, propLine)
          if (p == null) return null
          const prob = activeDirection === 'under' ? (1 - p) : p
          const ref  = activeDirection === 'under' ? (1 - trueOvProb) : trueOvProb
          return Math.round((prob - ref) * 100)
        })
      : filterStats.map(() => null)

    // Grid of stats — each filter gets its own column: label / fraction / pct
    let rateLinesHtml = ''
    if (vsUnknown || (hasFilter && noData)) {
      rateLinesHtml = `<div class="text-[9px] text-gray-600 font-mono mt-0.5">?</div>`
    } else if (hasFilter && filterStats.length) {
      const cols = filterStats.map((s, idx) => {
        const frac  = s.total > 0 ? `<div>${s.hits}/${s.total}</div>` : `<div class="text-gray-700">—</div>`
        const pct   = s.total > 0 ? `<div class="text-gray-500">${Math.round(s.hitRate * 100)}%</div>` : ''
        const ba    = s.ba    != null ? `<div class="text-sky-400/70">.${Math.round(s.ba * 1000).toString().padStart(3,'0')}</div>` : ''
        const abStr = s.avgAB != null ? `<div class="text-gray-600">${s.avgAB.toFixed(1)}ab</div>` : ''
        const edge  = binomEdges[idx] != null ? `<div class="${binomEdges[idx] > 0 ? 'text-emerald-400' : 'text-red-400'} font-bold">${binomEdges[idx] > 0 ? '+' : ''}${binomEdges[idx]}%</div>` : ''
        return `<div class="font-mono leading-tight">${frac}${pct}${ba}${abStr}${edge}</div>`
      })
      rateLinesHtml = `<div class="flex gap-3 justify-center text-[9px] text-gray-400 mt-0.5">${cols.join('')}</div>`
    }

    // Show only active-direction row when stat filter + direction both active
    const visibleRows = (hasFilter && activeDirection)
      ? prows.filter(r => activeDirection === 'over' ? isOver(r.seln_name) : !isOver(r.seln_name))
      : prows
    const displayRows = visibleRows.length ? visibleRows : prows

    // Inline binomial edge from career BA vs vig-stripped implied (player-level, stable across filter changes)
    let dbInlineEdge = null, dbEdgeStr = ''
    if (careerBA != null && careerAvgAB != null && propLine != null && trueOvProb != null) {
      const p = binomialProb(careerBA, careerAvgAB, propLine)
      if (p != null) {
        const prob = activeDirection === 'under' ? (1 - p) : p
        const ref  = activeDirection === 'under' ? (1 - trueOvProb) : trueOvProb
        dbInlineEdge = Math.round((prob - ref) * 100)
        const col = dbInlineEdge > 0 ? 'text-emerald-400' : 'text-red-400'
        dbEdgeStr = ` <span class="${col} font-mono text-[9px]">${dbInlineEdge > 0 ? '+' : ''}${dbInlineEdge}%</span>`
      }
    }
    const careerStr = careerBA != null
      ? ` <span class="text-[9px] text-gray-500 font-mono">.${Math.round(careerBA * 1000).toString().padStart(3,'0')}</span>${dbEdgeStr}`
      : ''

    const trows = displayRows.map((r, i) => {
      const line     = getLine(r.seln_name, r.seln_hcap)
      const otherRow = isOver(r.seln_name) ? underRow : overRow
      const val      = fmtOdds(r.us_prc, otherRow?.us_prc)
      const cls      = oddsClass(r.us_prc)
      const rs   = displayRows.length

      const clickLine   = overRow ? parseLine(overRow.seln_name) : null
      const safePlayer  = (playerName || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
      const safeMkt     = (mktName    || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'")
      const normPlayer  = normName(playerName)
      const safeMktNorm = normName(mktName).replace(/'/g,"\\'")
      const playerCell = i === 0
        ? `<td class="px-3 py-2 text-gray-300 align-middle whitespace-nowrap cursor-pointer hover:text-indigo-300 transition-colors select-none" rowspan="${rs}"
             data-player-exp="${normPlayer}_${entry?.matchId ?? 0}"
             onclick="togglePlayerExpansion(this,'${safePlayer}','${safeMkt}','${safeMktNorm}',${clickLine ?? 'null'},${entry?.matchId ?? 0},${entry?.match?.season_id ?? 0})">${abbrName(playerName)}${careerStr}</td>`
        : ''
      const statsCell = i === 0
        ? `<td class="stats-col px-3 py-2 align-top text-center" rowspan="${rs}">${rateLinesHtml}</td>`
        : ''
      return `<tr class="${shouldFilter ? 'filtered-row' : ''} border-t border-gray-700/40 hover:bg-white/[0.02]"${shouldFilter ? ' style="display:none"' : ''}>
        ${playerCell}
        ${statsCell}
        <td class="px-3 py-2 text-gray-500 text-[11px]">${line}</td>
        <td class="px-3 py-2 text-right font-mono font-semibold text-sm ${cls}" data-us="${r.us_prc ?? ''}" data-other-us="${otherRow?.us_prc ?? ''}">${val}</td>
      </tr>`
    }).join('')

    // Determine which side of this match the player belongs to (uses playerId/playerTeamUid resolved above)
    const teamKey = playerTeamUid === homeUid ? 'home'
                  : playerTeamUid === awayUid ? 'away'
                  : 'unknown'

    if (shouldFilter) failing.push({ trows, teamKey, edge: null })
    else              passing.push({ trows, teamKey, edge: dbInlineEdge })
  }

  // Sort passing by inline edge descending (highest positive first), nulls last
  passing.sort((a, b) => {
    if (a.edge == null && b.edge == null) return 0
    if (a.edge == null) return 1
    if (b.edge == null) return -1
    return b.edge - a.edge
  })

  // Group passing by home/away team (always, not just when filtered)
  const byTeam = new Map()
  for (const e of passing) {
    if (!byTeam.has(e.teamKey)) byTeam.set(e.teamKey, [])
    byTeam.get(e.teamKey).push(e)
  }
  const groups = [...byTeam.entries()]

  let html = ''
  for (const [key, entries] of groups) {
    const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
    const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
    if (teamLabel) {
      html += `<tr class="border-t border-gray-700/30">
        <td colspan="4" class="px-3 pt-2 pb-0.5 text-[9px] text-gray-600 font-mono uppercase tracking-widest">${teamLabel}</td>
      </tr>`
    }
    html += entries.map(e => e.trows).join('')
  }
  if (failing.length) {
    html += `<tr class="filter-summary-row border-t border-gray-700/20 cursor-pointer select-none" onclick="toggleFilteredRows(this)">
      <td colspan="4" class="px-3 py-1.5">
        <span class="filter-chev text-[10px] text-gray-600">▷ </span>
        <span class="text-[11px] text-gray-500">${failing.length} filtered</span>
      </td>
    </tr>`
    const failByTeam = new Map()
    for (const e of failing) {
      if (!failByTeam.has(e.teamKey)) failByTeam.set(e.teamKey, [])
      failByTeam.get(e.teamKey).push(e)
    }
    for (const [key, entries] of failByTeam) {
      const teamObj   = key === 'home' ? entry?.home : key === 'away' ? entry?.away : null
      const teamLabel = teamObj?.abbr ?? teamObj?.name ?? null
      if (teamLabel) {
        html += `<tr class="filtered-row border-t border-gray-700/20" style="display:none">
          <td colspan="4" class="px-3 pt-2 pb-0.5 text-[9px] text-gray-600 font-mono uppercase tracking-widest">${teamLabel}</td>
        </tr>`
      }
      html += entries.map(p => p.trows).join('')
    }
  }
  return html
}

function toggleFilteredRows(el) {

// ── Filter state ────────────────────────────────────────────────────────────
let activeFilters    = new Set(['L12'])   // all currently active filter keys — default L12
let pinnedFilters    = new Set()         // subset locked via corner circle (stay on main-click)
let activeDirection  = 'over'            // null | 'over' | 'under'
let filterCache      = {}
let filterLoading    = {}

function filterBtnClass(isActive) {
  return `relative flex-1 rounded-lg border transition-colors font-mono text-center py-1.5 outline-none focus:outline-none ${
    isActive
      ? 'bg-indigo-600 border-indigo-500 text-white'
      : 'bg-gray-800 border-gray-700 text-gray-400 hover:border-indigo-500'
  }`
}

let filterHeavyLines = false             // hide lines worse than -200
function toggleHeavyLine() {
  filterHeavyLines = !filterHeavyLines
  updateHeavyBtn()
  refreshMktTbodies([...activeFilters])
}

function updateHeavyBtn() {
  const hasFilter = activeFilters.size > 0
  const btn = document.getElementById('heavy-btn')
  if (!btn) return
  const active = hasFilter && filterHeavyLines
  btn.className = `text-[10px] px-2.5 rounded-lg border font-mono shrink-0 transition-colors ${
    active
      ? 'bg-indigo-600 border-indigo-500 text-white'
      : `bg-gray-800 border-gray-700 text-gray-400${hasFilter ? ' hover:border-indigo-500' : ''}`
  }`
}


function updateOUToggle() {
  const hasFilter = activeFilters.size > 0
  document.querySelectorAll('#ou-toggle [data-dir]').forEach(btn => {
    const active = hasFilter && btn.dataset.dir === activeDirection
    btn.className = `text-[10px] px-3 flex-1 font-mono transition-colors leading-none py-1.5 ${active ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400'}`
  })
}

function setDirection(dir) {
  activeDirection = activeDirection === dir ? null : dir   // toggle off if already active
  updateOUToggle()
  refreshMktTbodies([...activeFilters])
  for (const [key, exp] of expansions) {
    exp.lockedDirection = activeDirection || 'over'
    renderExpansionContent(key)
  }
}

const FILTER_LABELS = {
  L3:  ['last', '3'],
  L6:  ['last', '6'],
  L9:  ['last', '9'],
  L12: ['last', '12'],
  CS:  ['current', 'season'],
  VS:  ['vs',     'opp'],
}

function filterBtnInner(f, active, pinned) {
  const [line1, line2] = FILTER_LABELS[f]
  const col = active ? 'text-white' : 'text-gray-400'
  const showCircle = true
  const circleCls = pinned
    ? 'bg-indigo-300 border-indigo-200'
    : active ? 'border-white/30' : 'border-gray-600/60'
  return `<div class="text-[10px] leading-tight ${col}">${line1}</div>
          <div class="text-[10px] leading-tight ${col}">${line2}</div>
          ${showCircle ? `<span onclick="pinFilter('${f}');event.stopPropagation()"
                class="absolute bottom-1 right-1 w-2.5 h-2.5 rounded-full border ${circleCls} transition-colors"></span>` : ''}`
}

function filterBtnHtml(f) {
  const active = activeFilters.has(f)
  const pinned = pinnedFilters.has(f)
  return `<button onclick="selectFilter('${f}')" data-filter="${f}" class="${filterBtnClass(active)}">
    ${filterBtnInner(f, active, pinned)}
  </button>`
}

function renderGlobalFilterBar() {
  document.getElementById('global-filter-bar').innerHTML =
    ['L3','L6','L9','L12','CS','VS'].map(f => filterBtnHtml(f)).join('')
}

function updateGlobalFilterButtons() {
  document.querySelectorAll('#global-filter-bar [data-filter]').forEach(btn => {
    const f      = btn.dataset.filter
    const active = activeFilters.has(f)
    const pinned = pinnedFilters.has(f)
    btn.className = filterBtnClass(active)
    btn.innerHTML = filterBtnInner(f, active, pinned)
  })
}

function setGlobalFilterStatus(msg) {
  const el = document.querySelector('.filter-status-global')
  if (el) el.textContent = msg
}

const FILTER_ORDER = ['L3','L6','L9','L12','CS','VS']
function sortFilterKeys(keys) {
  return [...keys].sort((a, b) => FILTER_ORDER.indexOf(a) - FILTER_ORDER.indexOf(b))
}

function refreshMktTbodies(filterKeys) {
  filterKeys = sortFilterKeys(filterKeys)
  const hasF = filterKeys.length > 0
  for (const entry of allMatches) {
    const card = document.querySelector(`[data-match-id="${entry.matchId}"]`)
    if (!card) continue
    const cache = hasF ? filterCache[entry.matchId] : null
    card.querySelectorAll('tbody.mkt-tbody').forEach(tbody => {
      const normMkt = tbody.dataset.mkt
      const mktName = Object.keys(entry.markets).find(k => normName(k) === normMkt)
      if (!mktName) return
      tbody.innerHTML = renderMktTbodyContent(mktName, buildPlayerMap(entry.markets[mktName]), cache, filterKeys, entry)
      tbody.closest('table').classList.toggle('has-filter', hasF)
    })
  }
  updateOddsInPlace()
  reinstateExpansion()
}

async function applyFilters() {
  updateGlobalFilterButtons()
  updateOUToggle()
  updateHeavyBtn()
  if (!activeFilters.size) { refreshMktTbodies([]); return }
  const filters = [...activeFilters]

  const visible = allMatches
    .filter(e => activeTab === 'All' || e.sport === activeTab)
    .filter(e => activeMatch === null || e.matchId === activeMatch)

  const pending = visible.filter(e => !filterCache[e.matchId] && !filterLoading[e.matchId])
  if (pending.length) {
    setGlobalFilterStatus('Loading…')
    await Promise.all(pending.map(e => {
      filterLoading[e.matchId] = true
      return fetchFilterStats(e.matchId, e.match.season_id).then(() => {
        filterLoading[e.matchId] = false
      })
    }))
    setGlobalFilterStatus('')
  }

  refreshMktTbodies(filters)
}

async function selectFilter(f) {
  // Main area click: single-select replacing any non-pinned transient,
  // but deselect if f is already the sole non-pinned active filter
  const wasVS = activeFilters.has('VS')
  const isTransientOnly = activeFilters.has(f) && !pinnedFilters.has(f) &&
    activeFilters.size === pinnedFilters.size + 1
  activeFilters = isTransientOnly
    ? new Set(pinnedFilters)
    : new Set([...pinnedFilters, f])
  if (activeFilters.has('VS') && !wasVS) {
    filterCache = {}
    expansionCache.clear()
    for (const [, exp] of expansions) exp.games = undefined
  }
  await applyFilters()
}

async function pinFilter(f) {
  const wasVS = activeFilters.has('VS')
  if (activeFilters.has(f)) {
    // Already active → remove entirely
    activeFilters.delete(f)
    pinnedFilters.delete(f)
  } else {
    // Not active → if no pins yet, auto-pin current transient (first grouping)
    // If pins already exist, just add f — don't drag the transient in
    if (pinnedFilters.size === 0) {
      // First pin — auto-lock current transient too
      for (const k of activeFilters) pinnedFilters.add(k)
    }
    // Enforce max 3 pinned — evict least recently pinned (oldest in Set order)
    while (pinnedFilters.size >= 3) {
      pinnedFilters.delete(pinnedFilters.values().next().value)
    }
    pinnedFilters.add(f)
    // activeFilters = only pinned set (drop any transient)
    activeFilters = new Set([...pinnedFilters])
  }
  if (activeFilters.has('VS') && !wasVS) {
    filterCache = {}
    expansionCache.clear()
    for (const [, exp] of expansions) exp.games = undefined
  }
  await applyFilters()
}

async function fetchFilterStats(matchId, seasonId) {
  const entry = allMatches.find(e => e.matchId === matchId)
  if (!entry) return

  const playerNames = [...new Set(
    Object.values(entry.markets).flatMap(rows => rows.map(r => r.seln_hcap).filter(Boolean))
  )]

  // Build player name→id cache — may already be populated from eager load at startup
  // If not (e.g. first filter applied before eager load finished), fetch all players now
  if (!window._playerNameCache) {
    const [allPlayers, allTeams] = await Promise.all([
      fetchAll((from, to) => db.from('sr_players').select('id, name, team_uid').range(from, to)),
      fetchAll((from, to) => db.from('sr_teams').select('uid, name, abbr').range(from, to))
    ])
    window._playerNameCache    = {}
    window._playerTeamUidCache = {}
    window._teamCache          = {}
    for (const p of allPlayers) {
      window._playerNameCache[normName(p.name)] = p.id
      window._playerTeamUidCache[p.id]          = p.team_uid
    }
    for (const t of allTeams) window._teamCache[t.uid] = t
  }

  const normToId  = window._playerNameCache
  const playerIds = [...new Set(playerNames.map(n => findPlayerId(n, normToId)).filter(Boolean))]

  // Debug: surface players whose names don't resolve to any known ID (even fuzzy)
  const missing = playerNames.filter(n => !findPlayerId(n, normToId))
  if (missing.length) console.warn('[filter] no sr_players match for:', missing.map(n => `"${n}" → "${normName(n)}"`))

  if (!playerIds.length) { filterCache[matchId] = { normNameToGames: {}, teamsInfoByMid: {} }; return }

  const matchDate = entry.match?.match_date ?? new Date().toISOString()

  // Stage 1: get all (player_id, match_id, season_id) for these players — no JSONB, lightweight
  const playerMatchLinks = await fetchAll((from, to) =>
    db.from('sr_player_match_stats')
      .select('player_id, match_id, season_id')
      .in('player_id', playerIds)
      .order('player_id').order('match_id')
      .range(from, to)
  )
  if (!playerMatchLinks.length) { filterCache[matchId] = { normNameToGames: {}, teamsInfoByMid: {} }; return }

  const allMatchIds = [...new Set(playerMatchLinks.map(r => r.match_id))]

  // Stage 2: get dates for those matches, filter to completed before this match
  const matchDateRows = await fetchAll((from, to) =>
    db.from('sr_matches')
      .select('id, match_date, home_team_uid, away_team_uid')
      .in('id', allMatchIds)
      .not('home_score', 'is', null)
      .lt('match_date', matchDate)
      .order('id')
      .range(from, to)
  )
  if (!matchDateRows.length) { filterCache[matchId] = { normNameToGames: {}, teamsInfoByMid: {} }; return }

  const validMatchIds  = new Set(matchDateRows.map(m => m.id))
  const dateByMid      = Object.fromEntries(matchDateRows.map(m => [m.id, m.match_date]))
  const teamsInfoByMid = Object.fromEntries(matchDateRows.map(m => [m.id, { homeTeamUid: m.home_team_uid, awayTeamUid: m.away_team_uid }]))

  // Fetch any historical opponent teams not yet in the cache
  if (window._teamCache) {
    const histUids   = [...new Set(matchDateRows.flatMap(m => [m.home_team_uid, m.away_team_uid]).filter(Boolean))]
    const missingUids = histUids.filter(uid => !window._teamCache[uid])
    if (missingUids.length) {
      const { data: missingTeams } = await db.from('sr_teams').select('uid, name, abbr').in('uid', missingUids)
      for (const t of missingTeams ?? []) window._teamCache[t.uid] = t
    }
  }

  // Which match IDs count as current season?
  const csMatchIds = new Set(
    playerMatchLinks.filter(r => r.season_id === seasonId && validMatchIds.has(r.match_id)).map(r => r.match_id)
  )

  // Per-player: bucket valid match IDs, sort desc, take last 12 + all CS
  const perPlayer = {}
  for (const r of playerMatchLinks) {
    if (!validMatchIds.has(r.match_id)) continue
    if (!perPlayer[r.player_id]) perPlayer[r.player_id] = []
    perPlayer[r.player_id].push(r.match_id)
  }

  const neededByPlayer = new Map() // player_id → Set<match_id>
  const neededMatchIds = new Set()
  for (const [pid, mids] of Object.entries(perPlayer)) {
    const sorted = [...mids].sort((a, b) => new Date(dateByMid[b]) - new Date(dateByMid[a]))
    // VS mode: fetch full history so opponent filter has enough games to work with
    const l12    = activeFilters.has('VS') ? new Set(sorted) : new Set(sorted.slice(0, 12))
    const cs     = new Set(sorted.filter(mid => csMatchIds.has(mid)))
    const needed = new Set([...l12, ...cs])
    neededByPlayer.set(Number(pid), needed)
    needed.forEach(mid => neededMatchIds.add(mid))
  }
  if (!neededMatchIds.size) { filterCache[matchId] = { normNameToGames: {}, teamsInfoByMid }; return }

  // Career BA fetch — all games for these players, just hits + AB (no JSONB overhead)
  if (!window._careerBACache) window._careerBACache = {}
  const missingCareer = playerIds.filter(id => !window._careerBACache[id])
  if (missingCareer.length) {
    const careerRows = await fetchAll((from, to) =>
      db.from('sr_player_match_stats')
        .select('player_id, stats->hitting_hits, stats->hitting_at_bats')
        .in('player_id', missingCareer)
        .range(from, to)
    )
    const totals = {}
    for (const r of careerRows) {
      const pid = r.player_id
      const h   = Number(r.hitting_hits   ?? 0)
      const ab  = Number(r.hitting_at_bats ?? 0)
      if (ab === 0) continue
      if (!totals[pid]) totals[pid] = { h: 0, ab: 0, games: 0 }
      totals[pid].h     += h
      totals[pid].ab    += ab
      totals[pid].games += 1
    }
    for (const pid of missingCareer) {
      const t = totals[pid]
      window._careerBACache[pid] = (t && t.ab > 0) ? { ba: t.h / t.ab, avgAB: t.ab / t.games } : null
    }
  }

  // Stage 3: fetch stats JSONB only for the (player_id × match_id) pairs we need
  // Must paginate — VS mode can produce 3000+ rows which exceeds Supabase's 1000-row default
  const stats = await fetchAll((from, to) =>
    db.from('sr_player_match_stats')
      .select('player_id, match_id, stats, team_uid')
      .in('player_id', playerIds)
      .in('match_id', [...neededMatchIds])
      .order('player_id').order('match_id')
      .range(from, to)
  )

  const idToGames = {}
  for (const s of stats ?? []) {
    if (!neededByPlayer.get(s.player_id)?.has(s.match_id)) continue
    if (!idToGames[s.player_id]) idToGames[s.player_id] = []
    idToGames[s.player_id].push({ stats: s.stats, match_date: dateByMid[s.match_id], match_id: s.match_id, team_uid: s.team_uid })
  }
  for (const g of Object.values(idToGames)) g.sort((a, b) => new Date(b.match_date) - new Date(a.match_date))

  const normNameToGames = {}
  for (const name of playerNames) {
    const norm = normName(name)
    const id   = findPlayerId(name, normToId)
    if (id && idToGames[id]) {
      normNameToGames[norm] = idToGames[id].map(g => ({ ...g, inSeason: csMatchIds.has(g.match_id) }))
    } else if (id) {
      console.warn(`[filter] "${name}" (id=${id}) resolved but 0 completed games before ${matchDate}`)
    }
  }

  filterCache[matchId] = { normNameToGames, teamsInfoByMid }
}

// ── Core ────────────────────────────────────────────────────────────────────

let activeTab      = 'All'
let activeMatch    = null
let allMatches     = []
let pastExpanded   = false

async function fetchAll(queryFn) {
  const PAGE = 1000
  let rows = [], from = 0
  while (true) {
    const { data } = await queryFn(from, from + PAGE - 1)
    if (!data?.length) break
    rows = rows.concat(data)
    if (data.length < PAGE) break
    from += PAGE
  }
  return rows
}

function matchYMD(dateStr) {
  const TZ = 'America/Mexico_City'
  return new Intl.DateTimeFormat('en-CA', { timeZone: TZ }).format(new Date(dateStr))
}
function isMatchOld(dateStr) {
  if (!dateStr) return false
  return matchYMD(dateStr) < matchYMD(new Date().toISOString())
}

function dateLabel(dateStr) {
  if (!dateStr) return '—'
  const TZ       = 'America/Mexico_City'
  const d        = new Date(dateStr)
  const today    = new Date()
  const tomorrow = new Date(); tomorrow.setDate(today.getDate() + 1)
  const fmt      = dt => dt.toLocaleDateString('en-US', { timeZone: TZ, month: 'short', day: 'numeric' })
  const sameDay  = (a, b) => a.toLocaleDateString('en-US', { timeZone: TZ }) === b.toLocaleDateString('en-US', { timeZone: TZ })
  if (sameDay(d, today))    return 'Today'
  if (sameDay(d, tomorrow)) return 'Tomorrow'
  return fmt(d)
}

async function load() {
  document.getElementById('content').innerHTML = '<p class="text-xs text-gray-600">Loading…</p>'

  const odds = await fetchAll((f, t) =>
    db.from('sr_match_odds')
      .select('match_id, mkt_name, seln_name, seln_hcap, us_prc')
      .eq('published', true)
      .order('match_id').order('mkt_name').order('seln_hcap').order('seln_name')
      .range(f, t)
  )

  if (!odds.length) {
    document.getElementById('sport-tabs').innerHTML = ''
    document.getElementById('match-pills').innerHTML = ''
    document.getElementById('content').innerHTML = '<p class="text-xs text-gray-600 mt-12 text-center">No published props yet.</p>'
    return
  }

  const matchIds = [...new Set(odds.map(r => r.match_id))]
  const matchRows = []
  for (let i = 0; i < matchIds.length; i += 200) {
    const { data } = await db.from('sr_matches')
      .select('id, match_date, home_team_uid, away_team_uid, season_id')
      .in('id', matchIds.slice(i, i + 200))
    if (data) matchRows.push(...data)
  }
  const matchMap = Object.fromEntries(matchRows.map(m => [m.id, m]))

  const teamUids = [...new Set(matchRows.flatMap(m => [m.home_team_uid, m.away_team_uid]).filter(Boolean))]
  const teamRows = []
  for (let i = 0; i < teamUids.length; i += 200) {
    const { data } = await db.from('sr_teams').select('uid, name, abbr').in('uid', teamUids.slice(i, i + 200))
    if (data) teamRows.push(...data)
  }
  const teamMap = Object.fromEntries(teamRows.map(t => [t.uid, t]))

  const byMatch = {}
  for (const row of odds) {
    if (!byMatch[row.match_id]) byMatch[row.match_id] = {}
    const key = row.mkt_name || '—'
    if (!byMatch[row.match_id][key]) byMatch[row.match_id][key] = []
    byMatch[row.match_id][key].push(row)
  }

  allMatches = Object.entries(byMatch).map(([mid, markets]) => {
    const m    = matchMap[Number(mid)]
    const info = (m && SEASON_INFO[m.season_id]) ?? { sport: 'Other', league: '—' }
    const home = teamMap[m?.home_team_uid]
    const away = teamMap[m?.away_team_uid]
    return {
      matchId: Number(mid), match: m, home, away,
      abbr: `${home?.abbr ?? '?'} v ${away?.abbr ?? '?'}`,
      sport: info.sport, league: info.league, markets,
    }
  }).sort((a, b) => new Date(a.match?.match_date) - new Date(b.match?.match_date))

  filterCache = {}; filterLoading = {}
  window._playerNameCache = null; window._playerTeamUidCache = null; window._teamCache = null; window._careerBACache = null

  // Eagerly load all players so name resolution works for any match
  ;(async () => {
    const allPlayers = await fetchAll((from, to) =>
      db.from('sr_players').select('id, name, team_uid').range(from, to)
    )
    window._playerNameCache    = {}
    window._playerTeamUidCache = {}
    window._teamCache          = teamMap
    for (const p of allPlayers) {
      window._playerNameCache[normName(p.name)] = p.id
      window._playerTeamUidCache[p.id]          = p.team_uid
    }
  })()

  const sports = ['All', ...new Set(allMatches.map(e => e.sport))]
  if (!sports.includes(activeTab)) activeTab = 'All'
  document.getElementById('sport-tabs').innerHTML = sports.map(s => `
    <button onclick="setTab('${s}')" id="tab-${s}"
      class="tab-btn px-3 py-2.5 text-xs font-medium whitespace-nowrap border-b-2 transition-colors ${s === activeTab ? 'tab-active' : 'tab-inactive'}">
      ${s}
    </button>`).join('')

  if (activeMatch !== null && !allMatches.find(e => e.matchId === activeMatch)) activeMatch = null

  renderPills()
  render()
}

function renderPills() {
  const tabMatches = activeTab === 'All' ? allMatches : allMatches.filter(e => e.sport === activeTab)
  const visible    = tabMatches.filter(e => !isMatchOld(e.match?.match_date))
  const _cutoffBase = new Date(); _cutoffBase.setDate(_cutoffBase.getDate() - 2); _cutoffBase.setHours(0, 0, 0, 0)
  const past       = tabMatches.filter(e => isMatchOld(e.match?.match_date) && e.match?.match_date && new Date(e.match.match_date) >= _cutoffBase)
  const pillsEl    = document.getElementById('match-pills')
  const wrapper    = document.getElementById('match-pills-wrapper')

  if (visible.length <= 1 && past.length === 0) { pillsEl.innerHTML = ''; wrapper.className = ''; return }
  wrapper.className = 'border-b border-gray-800'

  let lastLabel = null
  const parts = []
  for (const e of visible) {
    const lbl = dateLabel(e.match?.match_date)
    if (lbl !== lastLabel) {
      parts.push(`<span class="text-[10px] text-gray-400 shrink-0 ${lastLabel !== null ? 'ml-2' : ''}">${lbl}</span>`)
      lastLabel = lbl
    }
    const active = activeMatch === e.matchId
    parts.push(`
      <button onclick="setMatch(${e.matchId})"
        class="match-pill text-[11px] px-2.5 py-1 rounded-full border transition-colors whitespace-nowrap shrink-0 font-mono
               ${active ? 'match-pill-active' : 'match-pill-inactive'}">
        ${e.abbr}
      </button>`)
  }

  if (past.length > 0) {
    parts.push(`<span class="text-[10px] text-gray-600 shrink-0 ml-2">·</span>`)
    parts.push(`
      <button onclick="pastExpanded=!pastExpanded;renderPills()"
        class="text-[11px] px-2.5 py-1 rounded-full border transition-colors whitespace-nowrap shrink-0 font-mono
               border-gray-700 text-gray-500 hover:text-gray-300 hover:border-gray-500">
        ${pastExpanded ? '▾' : '▸'} Past 48h (${past.length})
      </button>`)
    if (pastExpanded) {
      let pastLabel = null
      for (const e of past) {
        const lbl = dateLabel(e.match?.match_date)
        if (lbl !== pastLabel) {
          parts.push(`<span class="text-[10px] text-gray-400 shrink-0 ml-2">${lbl}</span>`)
          pastLabel = lbl
        }
        const active = activeMatch === e.matchId
        parts.push(`
          <button onclick="setMatch(${e.matchId})"
            class="match-pill text-[11px] px-2.5 py-1 rounded-full border transition-colors whitespace-nowrap shrink-0 font-mono opacity-60
                   ${active ? 'match-pill-active' : 'match-pill-inactive'}">
            ${e.abbr}
          </button>`)
      }
    }
  }

  pillsEl.innerHTML = parts.join('')
}

function setTab(tab) {
  activeTab = tab; activeMatch = null
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const a = btn.id === `tab-${tab}`
    btn.classList.remove('tab-active', 'tab-inactive')
    btn.classList.add(a ? 'tab-active' : 'tab-inactive')
  })
  renderPills(); render()
}

function setMatch(matchId) {
  activeMatch = activeMatch === matchId ? null : matchId
  renderPills(); render(); applyFilters()
}

function getLine(seln_name, seln_hcap) {
  const val = parseLine(seln_name)
  if (val != null) return `${isOver(seln_name) ? '>' : '<'}${val}`
  return seln_name || '—'
}

function renderMatch(entry) {
  const { matchId, match, home, away, league, markets } = entry
  const homeFull = home?.name ?? '?'
  const awayFull = away?.name ?? '?'
  const dateStr  = match?.match_date
    ? new Date(match.match_date).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Mexico_City' })
    : '—'
  const colLabel = MODES[modeIdx].col
  const cache    = filterCache[matchId] ?? null

  const filterKeys = sortFilterKeys([...activeFilters])
  const hasFilter  = filterKeys.length > 0

  const mktsHtml = Object.entries(markets).map(([mktName, rows]) => {
    const normMkt   = normName(mktName)
    const playerMap = buildPlayerMap(rows)
    const tbodyHtml = renderMktTbodyContent(mktName, playerMap, cache, filterKeys, entry)

    return `
      <div class="mt-4">
        <div onclick="var b=this.nextElementSibling;var open=b.style.display!=='none';b.style.display=open?'none':'';this.querySelector('.chev').textContent=open?'▶':'▼';"
          class="flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-white/[0.03] rounded select-none">
          <p class="text-[10px] font-semibold uppercase tracking-widest text-gray-500">${cleanMktName(mktName)}</p>
          <span class="chev text-gray-600 text-[9px] ml-2">▶</span>
        </div>
        <div class="mkt-body" style="display:none">
          <table class="w-full text-xs ${hasFilter ? 'has-filter' : ''}">
            <thead>
              <tr class="border-b border-gray-700/60">
                <th class="text-left px-3 py-1.5 text-gray-600 font-normal">Player</th>
                <th class="stats-col text-center px-3 py-1.5 text-gray-600 font-normal font-mono">Hit</th>
                <th class="text-left px-3 py-1.5 text-gray-600 font-normal">Line</th>
                <th class="text-right px-3 py-1.5 text-gray-600 font-normal font-mono" data-col-label>${colLabel}</th>
              </tr>
            </thead>
            <tbody class="mkt-tbody" data-mkt="${normMkt}">${tbodyHtml}</tbody>
          </table>
        </div>
      </div>`
  }).join('')

  return `
    <div class="bg-gray-900 rounded-xl overflow-hidden border border-gray-800/50" data-match-id="${matchId}">
      <div onclick="var b=this.nextElementSibling;var open=b.style.display!=='none';b.style.display=open?'none':'';this.querySelector('.mchev').textContent=open?'▶':'▼';b.querySelectorAll('.mkt-body').forEach(function(el){el.style.display='none'});b.querySelectorAll('.chev').forEach(function(el){el.textContent='▶'})"
        class="px-4 py-3 flex items-start justify-between bg-gray-800/40 cursor-pointer select-none">
        <div>
          <p class="text-sm font-semibold text-white">${homeFull} vs ${awayFull}</p>
          <p class="text-xs text-gray-600 mt-0.5">${dateStr}</p>
        </div>
        <div class="flex items-center gap-2 mt-0.5">
          <span class="text-[10px] px-2 py-0.5 rounded bg-gray-700/70 text-gray-500 shrink-0">${league}</span>
          <span class="mchev text-gray-600 text-[9px] shrink-0">▼</span>
        </div>
      </div>
      <div class="pb-3">${mktsHtml}</div>
    </div>`
}

function render() {
  renderGlobalFilterBar()
  let entries = (activeTab === 'All' ? allMatches : allMatches.filter(e => e.sport === activeTab))
    .filter(e => !isMatchOld(e.match?.match_date) || e.matchId === activeMatch)
  if (activeMatch !== null) entries = entries.filter(e => e.matchId === activeMatch)
  if (!entries.length) {
    document.getElementById('content').innerHTML = '<p class="text-xs text-gray-600 mt-12 text-center">No published props for this sport.</p>'
    return
  }
  document.getElementById('content').innerHTML = entries.map(renderMatch).join('')
}

load()

// ── Player Row Expansion ─────────────────────────────────────────────────────

// Map: playerKey → { playerName, mktName, normMkt, propLine, matchId, seasonId, lockedDirection, tr }
const expansions = new Map()

// Cache: key → { games, playerTeamUid } — persists across collapse/re-expand
const expansionCache = new Map()


function togglePlayerExpansion(td, playerName, mktName, normMkt, propLine, matchId, seasonId) {
  const decode = s => s.replace(/&#39;/g, "'")
  playerName = decode(playerName)
  mktName    = decode(mktName)
  const key  = normName(playerName) + '_' + matchId

  // Toggle off if already open
  if (expansions.has(key)) {
    collapseExpansion(key)
    if (!expansions.size) updateGlobalFilterButtons()
    return
  }

  if (expansions.size === 0) {
    updateGlobalFilterButtons()
  }

  const openedWhileFiltered = td.closest('tr')?.classList.contains('filtered-row') ?? false
  expansions.set(key, { playerName, mktName, normMkt, propLine, matchId, seasonId, lockedDirection: activeDirection || 'over', tr: null, openedWhileFiltered })

  insertExpansionRow(td, key)
  fetchExpansionData(key)
}

async function fetchExpansionData(key, prefetchOnly = false) {
  const exp = expansions.get(key)
  if (!exp) return

  const realKey = key.replace(/^__prefetch__/, '')

  // Use cache if available
  if (expansionCache.has(realKey)) {
    const cached = expansionCache.get(realKey)
    exp.games = cached.games
    exp.playerTeamUid = cached.playerTeamUid
    if (!prefetchOnly) renderExpansionContent(key)
    return
  }

  const cell = getExpCell(key)
  if (cell) cell.innerHTML = '<p class="text-xs text-gray-500">Loading…</p>'

  const { playerName, matchId, seasonId } = exp

  // Ensure player/team caches are available
  if (!window._playerNameCache) {
    const [allPlayers, allTeams] = await Promise.all([
      fetchAll((from, to) => db.from('sr_players').select('id, name, team_uid').range(from, to)),
      fetchAll((from, to) => db.from('sr_teams').select('uid, name, abbr').range(from, to))
    ])
    window._playerNameCache    = {}
    window._playerTeamUidCache = {}
    window._teamCache          = {}
    for (const p of allPlayers) {
      window._playerNameCache[normName(p.name)] = p.id
      window._playerTeamUidCache[p.id]          = p.team_uid
    }
    for (const t of allTeams) window._teamCache[t.uid] = t
  }

  const playerId      = findPlayerId(playerName, window._playerNameCache)
  const playerTeamUid = playerId ? window._playerTeamUidCache?.[playerId] : null

  if (!playerId) {
    if (cell) cell.innerHTML = '<p class="text-[11px] text-gray-600 py-2">Player not found in database</p>'
    return
  }

  // Get the prop match date so we only show games before it
  const propMatchEntry = allMatches.find(e => e.matchId === matchId)
  const propMatchDate  = propMatchEntry?.match?.match_date ?? new Date().toISOString()

  // Stage 1: get all match IDs this player has stats for (lightweight — no JSONB)
  const { data: matchLinks } = await db.from('sr_player_match_stats')
    .select('match_id')
    .eq('player_id', playerId)

  if (!matchLinks?.length) {
    exp.games = []; exp.playerTeamUid = playerTeamUid
    expansionCache.set(realKey, { games: [], playerTeamUid })
    if (!prefetchOnly) renderExpansionContent(key); return
  }

  const allMatchIds = matchLinks.map(r => r.match_id)

  // Stage 2: filter those to completed matches up to and including the prop date
  // When VS filter is active fetch full history; otherwise cap at 12
  let expQ = db.from('sr_matches')
    .select('id, match_date, home_team_uid, away_team_uid, season_id')
    .in('id', allMatchIds)
    .not('home_score', 'is', null)
    .lte('match_date', propMatchDate)
    .order('match_date', { ascending: false })
  if (!activeFilters.has('VS')) expQ = expQ.limit(12)
  const { data: matchRows } = await expQ

  if (!matchRows?.length) {
    exp.games = []; exp.playerTeamUid = playerTeamUid
    expansionCache.set(realKey, { games: [], playerTeamUid })
    if (!prefetchOnly) renderExpansionContent(key); return
  }

  // Stage 3: fetch actual JSONB stats for those 12 matches
  const neededIds = matchRows.map(m => m.id)
  const { data: statsRows } = await db.from('sr_player_match_stats')
    .select('match_id, stats, team_uid')
    .eq('player_id', playerId)
    .in('match_id', neededIds)

  const statsByMid = {}
  const teamUidByMid = {}
  for (const s of statsRows ?? []) { statsByMid[s.match_id] = s.stats; teamUidByMid[s.match_id] = s.team_uid }

  // Fetch any teams not yet in cache (both home and away for all games)
  const allUids     = matchRows.flatMap(m => [m.home_team_uid, m.away_team_uid])
  const missingUids = [...new Set(allUids)].filter(uid => !window._teamCache?.[uid])
  if (missingUids.length) {
    const { data: missing } = await db.from('sr_teams').select('uid, name, abbr').in('uid', missingUids)
    for (const t of missing ?? []) window._teamCache[t.uid] = t
  }

  exp.games = matchRows.map(m => ({
    match_id:    m.id,
    match_date:  m.match_date,
    gameTeamUid: teamUidByMid[m.id] ?? null,
    season_id:   m.season_id,
    homeTeamUid: m.home_team_uid,
    awayTeamUid: m.away_team_uid,
    stats:       statsByMid[m.id] ?? null,
    isPropGame:  m.id === matchId
  }))
  exp.playerTeamUid = playerTeamUid

  expansionCache.set(realKey, { games: exp.games, playerTeamUid })
  if (!prefetchOnly) renderExpansionContent(key)
}

function insertExpansionRow(td, key) {
  let lastRow = td.closest('tr')
  const rs    = td.rowSpan || 1
  for (let i = 1; i < rs; i++) lastRow = lastRow.nextElementSibling
  lastRow.insertAdjacentHTML('afterend', `
    <tr data-expansion-key="${key}" class="border-t border-gray-700/30">
      <td colspan="10" class="px-4 py-4 bg-gray-900/60" data-expansion-cell="${key}"></td>
    </tr>`)
  const exp = expansions.get(key)
  if (exp) exp.tr = lastRow.nextElementSibling
}

function collapseExpansion(key) {
  const exp = expansions.get(key)
  if (exp?.tr) exp.tr.remove()
  expansions.delete(key)
}

function getExpCell(key) {
  return expansions.get(key)?.tr?.querySelector(`[data-expansion-cell="${key}"]`)
}

function reinstateExpansion() {
  const toCollapse = []
  for (const [key, exp] of expansions) {
    exp.tr = null
    const { normMkt, matchId } = exp
    const td = document.querySelector(
      `[data-match-id="${matchId}"] tbody.mkt-tbody[data-mkt="${normMkt}"] [data-player-exp="${key}"]`)
    if (!td) continue
    // Collapse if filtered state changed in either direction
    const nowFiltered = td.closest('tr')?.classList.contains('filtered-row') ?? false
    if (nowFiltered || exp.openedWhileFiltered) { toCollapse.push(key); continue }
    insertExpansionRow(td, key)
    if (exp.games !== undefined) renderExpansionContent(key)
    else fetchExpansionData(key)
  }
  toCollapse.forEach(key => collapseExpansion(key))
  if (!expansions.size) updateGlobalFilterButtons()
}

function renderExpansionContent(key) {
  const exp  = expansions.get(key)
  const cell = getExpCell(key)
  if (!exp || !cell) return

  const { mktName, propLine, seasonId, lockedDirection, games, playerTeamUid } = exp

  if (games === undefined) {
    cell.innerHTML = '<p class="text-xs text-gray-500">Loading…</p>'
    return
  }

  if (!activeFilters.size) {
    cell.innerHTML = '<p class="text-[11px] text-gray-600 py-2">Select a filter above to see chart</p>'
    return
  }

  const filterKey   = sortFilterKeys([...activeFilters]).at(-1)
  const isCS        = filterKey === 'CS'
  const isVS        = filterKey === 'VS'
  const N           = isCS || isVS ? Infinity : parseInt(filterKey.slice(1))

  const statKey     = mktToStatKey(mktName)
  const isHitsMkt   = statKey === 'hitting_hits'
  const sport       = SEASON_INFO[seasonId]?.sport ?? ''
  const showMinutes = sport === 'Soccer' || sport === 'Basketball' || sport === 'NBA'

  // games sorted desc (most recent first); exclude 0-AB games for hits markets, then reverse for display
  const gamesFiltered = isHitsMkt
    ? games.filter(g => (g.stats?.hitting_at_bats ?? 0) > 0)
    : games

  // VS filter key: restrict bars to games vs upcoming opponent
  let vsGames = gamesFiltered
  if (activeFilters.has('VS')) {
    const matchEntry = allMatches.find(e => e.matchId === exp.matchId)
    const mHomeUid = matchEntry?.match?.home_team_uid
    const mAwayUid = matchEntry?.match?.away_team_uid
    // Determine upcoming opponent from current team or either side of the match
    const upcomingOpp = playerTeamUid === mHomeUid ? mAwayUid
                      : playerTeamUid === mAwayUid ? mHomeUid
                      : mHomeUid ?? null  // fallback: just pick one side
    if (upcomingOpp != null) {
      vsGames = gamesFiltered.filter(g => {
        const gameTeamUid = g.gameTeamUid != null ? Number(g.gameTeamUid) : playerTeamUid
        const oppUid = gameTeamUid === g.homeTeamUid ? g.awayTeamUid
                     : gameTeamUid === g.awayTeamUid ? g.homeTeamUid : null
        return oppUid === upcomingOpp
      })
    }
  }

  const barsData = (isCS ? vsGames.filter(g => g.season_id === seasonId)
                  : isVS ? vsGames
                  : vsGames.slice(0, N)).reverse()

  const CHART_H   = 120
  const allVals    = barsData.map(g => statKey ? Number(g.stats?.[statKey] ?? 0) : 0)
  const maxAB      = isHitsMkt ? Math.max(...barsData.map(g => Number(g.stats?.hitting_at_bats ?? 0)), 1) : 0
  const maxVal     = Math.max(...allVals, propLine ?? 0, maxAB, 0)
  const maxChart   = maxVal > 0 ? maxVal * 1.35 : 1
  const linePct    = (propLine != null && maxChart > 0) ? (propLine / maxChart * 100) : null


  const barsHtml = barsData.length === 0
    ? '<p class="text-[10px] text-gray-700 py-4">No games in this window</p>'
    : barsData.map(g => {
        const rawVal   = statKey ? (g.stats?.[statKey] ?? null) : null
        const value    = rawVal != null ? Number(rawVal) : 0
        const isHome   = playerTeamUid != null ? g.homeTeamUid === playerTeamUid : null
        const oppUid   = isHome !== null ? (isHome ? g.awayTeamUid : g.homeTeamUid) : null
        const opp      = oppUid ? window._teamCache?.[oppUid] : null
        const isProp   = g.isPropGame === true
        const passes   = propLine != null ? (lockedDirection === 'under' ? value < propLine : value > propLine) : null
        const minutes  = showMinutes ? (g.stats?.minutes ?? g.stats?.minutes_played ?? g.stats?.time_played ?? null) : null
        const dateStr  = g.match_date ? new Date(g.match_date).toLocaleDateString('en-US', { timeZone: 'UTC', month: 'numeric', day: 'numeric' }) : '—'
        const heightPx = maxChart > 0 ? Math.round((value / maxChart) * CHART_H) : 0
        const barH     = value > 0 ? Math.max(heightPx, 3) : 0
        const color    = isProp ? 'bg-yellow-400' : passes === null ? 'bg-gray-600' : passes ? 'bg-green-500' : 'bg-red-500'
        const dispVal  = value % 1 === 0 ? String(value) : value.toFixed(1)
        const homeAway = isHome === null ? '' : isHome ? 'Home' : 'Away'
        const haCls    = isHome === null ? 'text-gray-600' : isHome ? 'text-blue-400' : 'text-orange-400'
        const valCls   = passes === true ? 'text-green-400' : passes === false ? 'text-red-400' : 'text-gray-400'
        const ab     = isHitsMkt && g.stats ? Number(g.stats.hitting_at_bats ?? 0) : null
        const abBarH = ab != null && maxChart > 0 ? Math.round((ab / maxChart) * CHART_H) : 0

        let barInner
        if (value === 0) {
          barInner = `<span class="absolute text-[10px] font-bold text-gray-600 leading-none text-center w-full" style="bottom:6px">0</span>
                      <div class="absolute bottom-0 left-0.5 right-0.5 bg-gray-800 rounded-t" style="height:3px"></div>`
        } else if (heightPx < 18) {
          barInner = `<span class="absolute text-[10px] font-bold ${valCls} leading-none text-center w-full" style="bottom:${barH + 3}px">${dispVal}</span>
                      <div class="${color} absolute bottom-0 left-0.5 right-0.5 rounded-t" style="height:${barH}px"></div>`
        } else {
          barInner = `<div class="${color} absolute bottom-0 left-0.5 right-0.5 rounded-t flex items-center justify-center" style="height:${barH}px">
                        <span class="text-[10px] font-bold text-white leading-none">${dispVal}</span>
                      </div>`
        }

        const hitMissLabel = isProp && passes !== null
          ? `<span class="text-[9px] font-bold leading-none ${passes ? 'text-green-400' : 'text-red-400'}">${passes ? 'HIT' : 'MISS'}</span>`
          : `<span class="text-[9px] leading-none opacity-0">·</span>`

        return `<div class="flex-1 min-w-0 flex flex-col items-center gap-0.5">
          <span class="text-[10px] font-mono text-gray-300 leading-none truncate w-full text-center">${opp?.abbr ?? '?'}</span>
          <span class="text-[9px] ${haCls} leading-none">${homeAway}</span>
          ${hitMissLabel}
          <div class="relative w-full mt-1" style="height:${CHART_H}px">
            ${ab != null && ab > 0 ? `<div class="absolute bottom-0 left-0 right-0 rounded-t bg-sky-500/20 flex items-start justify-center pt-0.5" style="height:${Math.min(abBarH, CHART_H)}px"><span class="text-[9px] text-sky-400 font-mono leading-none">${ab}</span></div>` : ''}
            ${barInner}
            ${linePct != null ? `<div class="absolute border-t border-white/70 pointer-events-none" style="left:-3px;right:-3px;bottom:${linePct.toFixed(1)}%;z-index:10"></div>` : ''}
          </div>
          <span class="text-[9px] ${isProp ? 'text-white/60' : 'text-gray-500'} mt-0.5 leading-none">${dateStr}</span>
          ${minutes != null ? `<span class="text-[9px] text-gray-600 leading-none">${minutes}m</span>` : ''}
        </div>`
      }).join('')

  cell.innerHTML = !statKey
    ? '<p class="text-[11px] text-gray-600 py-2">No stat mapping for this market</p>'
    : `<div class="flex gap-1.5 overflow-hidden">${barsHtml}</div>`
}
</script>
